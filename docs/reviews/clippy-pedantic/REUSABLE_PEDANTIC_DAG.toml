# =============================================================================
# REUSABLE CLIPPY PEDANTIC REMEDIATION DAG
# =============================================================================
# A drop-in template for systematically eliminating clippy::pedantic warnings
# from any Rust workspace. Includes AI slop gap coverage (P13-P16) for codebases
# with AI-assisted development.
#
# Created: 2026-04-06
# =============================================================================

[meta]
title = "Clippy Pedantic Remediation DAG Template"
description = '''
A reusable, self-contained DAG for remediating clippy::pedantic warnings in
any Rust workspace. Covers 12 pedantic lint categories plus 4 AI slop gap
units (unwrap abuse, unsafe indexing, iterator inefficiencies, unsafe blocks).
Organized in 4 layers to avoid cross-cutting conflicts: Layer 0 (code
semantics), Layer 1 (code structure), Layer 2 (documentation), Layer 3
(final validation). Each unit targets a single lint category or closely
related cluster so that subagents/developers have clear, focused scope.'''
version = "1.0.0"
rust_edition_min = "2021"
total_units = 16
tier1_units = ["P01", "P02", "P03", "P13"]
tier2_units = ["P04", "P05", "P06", "P07", "P14", "P15"]
tier3_units = ["P08", "P09", "P10", "P11", "P12", "P16"]

# =============================================================================
# DISCOVERY
# =============================================================================
# Run these commands FIRST to measure your baseline. Record the numbers in
# the [workspace] section below. These numbers drive priority and LOC estimates.
# =============================================================================

[discovery]
description = '''
Before instantiating this template, run the discovery commands below to
populate your workspace-specific warning counts. Replace placeholder values
(marked YOUR_*) throughout this file with actual numbers and file paths.'''

[discovery.commands]
total_warnings = '''
cargo clippy --workspace --all-targets -- -W clippy::pedantic 2>&1 \
  | grep '^warning:' | grep -v 'deprecat' | wc -l'''

per_crate_distribution = '''
cargo clippy --workspace --all-targets -- -W clippy::pedantic 2>&1 \
  | grep '^warning:' | grep -v 'deprecat' \
  | sed 's|.*--> ||' | cut -d/ -f1-2 | sort | uniq -c | sort -rn'''

per_category_breakdown = '''
cargo clippy --workspace --all-targets -- -W clippy::pedantic 2>&1 \
  | grep '^warning:.*clippy::' | sed 's/.*clippy::/clippy::/' \
  | cut -d'`' -f1 | sort | uniq -c | sort -rn'''

must_use_candidates = '''
cargo clippy --workspace --all-targets -- -W clippy::pedantic 2>&1 \
  | grep -c 'clippy::must_use_candidate\|clippy::return_self_not_must_use' '''

redundant_closures = '''
cargo clippy --workspace --all-targets -- -W clippy::pedantic 2>&1 \
  | grep -c 'clippy::redundant_closure\|clippy::map_unwrap_or' '''

format_string_issues = '''
cargo clippy --workspace --all-targets -- -W clippy::pedantic 2>&1 \
  | grep -c 'clippy::format_push_string\|clippy::uninlined_format_args\|clippy::format_in_format_args' '''

wildcard_match_arms = '''
cargo clippy --workspace --all-targets -- -W clippy::pedantic 2>&1 \
  | grep -c 'clippy::wildcard_enum_match_arm\|clippy::single_match\|clippy::match_same_arms' '''

cast_warnings = '''
cargo clippy --workspace --all-targets -- -W clippy::pedantic 2>&1 \
  | grep -c 'clippy::cast_' '''

misc_quality = '''
cargo clippy --workspace --all-targets -- -W clippy::pedantic 2>&1 \
  | grep -c 'clippy::unreadable_literal\|clippy::needless_raw_string\|clippy::needless_pass_by_value\|clippy::redundant_clone\|clippy::manual_let_else' '''

items_after_statements = '''
cargo clippy --workspace --all-targets -- -W clippy::pedantic 2>&1 \
  | grep -c 'clippy::items_after_statements' '''

too_many_lines = '''
cargo clippy --workspace --all-targets -- -W clippy::pedantic 2>&1 \
  | grep -c 'clippy::too_many_lines' '''

missing_errors_doc = '''
cargo clippy --workspace --all-targets -- -W clippy::pedantic 2>&1 \
  | grep -c 'clippy::missing_errors_doc' '''

doc_markdown = '''
cargo clippy --workspace --all-targets -- -W clippy::pedantic 2>&1 \
  | grep -c 'clippy::doc_markdown\|clippy::missing_panics_doc\|clippy::doc_link_with_quotes' '''

unwrap_usage = '''
grep -rn '\.unwrap()' crates/ --include='*.rs' \
  | grep -v '#\[cfg(test)\]' | grep -v '/tests/' | wc -l'''

unsafe_indexing = '''
# Approximate count. Run clippy::indexing_slicing for precise count:
cargo clippy --workspace -- -W clippy::indexing_slicing 2>&1 \
  | grep -c 'clippy::indexing_slicing' '''

needless_collect = '''
cargo clippy --workspace -- -W clippy::needless_collect 2>&1 \
  | grep -c 'clippy::needless_collect' '''

unsafe_blocks = '''
grep -rn 'unsafe {' crates/ --include='*.rs' | wc -l'''

files_for_unit = '''
# Discover which files are affected by a specific lint. Example for must_use:
cargo clippy --workspace --all-targets -- -W clippy::pedantic 2>&1 \
  | grep 'clippy::must_use_candidate' | sed 's/.*--> //' | cut -d: -f1 \
  | sort -u'''

