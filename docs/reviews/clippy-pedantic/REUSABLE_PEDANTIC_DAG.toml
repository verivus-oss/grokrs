is known (e.g., args[0] after checking args.len()). (2) The code is in
a hot loop where the bounds check is provably redundant. Enable
clippy::indexing_slicing as a workspace warning.
(AI Slop: 'Index-Based Access Without Bounds Checking'.)'''
