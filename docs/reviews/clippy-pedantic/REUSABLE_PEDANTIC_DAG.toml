# ===========================================================================
# LAYER 1 -- Code structure: moving items, splitting functions
# ===========================================================================

[units.P07]
name = "Fix items_after_statements: hoist inner items to block/module scope"
summary = '''
Fix items_after_statements warnings. In Rust, items (fn, struct, impl,
const) defined inside a function body are visible from the start of the
enclosing block, not from their textual position. Placing them after
executable statements is confusing because it suggests they depend on
prior state. Fix by: (1) Moving inner helper functions to before the
first statement in the block. (2) For complex helpers, extracting to
module scope as pub(crate) or private functions. (3) For const items,
moving to the top of the function or to module scope.'''
layer = 1
tier = 2
status = "pending"
depends_on = ["P01", "P02", "P03"]
blocks = ["P12"]
estimated_warnings_pct = 7
estimated_loc = "YOUR_ITEMS_AFTER_COUNT * 1.5"
files_create = []
files_modify = ["DISCOVER_VIA_CLIPPY"]
acceptance = [
  "Zero clippy::items_after_statements warnings remain",
  "No inner function hoisted above a statement it logically depends on (e.g., captures a local)",
  "Helper functions extracted to module scope where they exceed 10 lines",
  "Const items moved to module scope or top of function",
  "Zero test regressions",
]
produces = ["ART:items-hoisted"]
consumes = ["ART:must-use", "ART:closures-combinators", "ART:format-strings"]
critical_decisions = [
  "Items that capture locals via closure must stay inside the function -- move them above the first statement, not outside.",
  "Items used only in tests (#[cfg(test)]) stay in the test module, just hoisted to before the first statement.",
  "Prefer module-scope extraction for helpers >10 lines to reduce function body size.",
]
rationale = '''
Moving items is a structural change that can conflict with semantic changes
in P01-P03, hence Layer 1 (depends on Layer 0 completing). Typically ~7%
of pedantic warnings.'''

