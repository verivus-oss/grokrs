# =============================================================================
# APPROACH PHILOSOPHY (hard-won knowledge from remediation experience)
# =============================================================================
#
# Each unit targets a single lint category or closely related cluster.
# This ensures subagents have clear, focused scope and avoid cross-cutting
# conflicts. Units are ordered by dependency:
#
# Layer 0: Code semantics (must_use, closures, casts, match arms, format)
#          These change signatures and expressions -- must land first.
# Layer 1: Code structure (items_after_statements, long functions, bools)
#          These move code around -- must land after semantic changes.
# Layer 2: Documentation (errors_doc, panics_doc, doc_markdown, URLs)
#          These are additive comments only -- no code changes, safe last.
# Layer 3: Final validation (all units integrated, zero warnings, green CI)
#
# KEY RESEARCH REFERENCES:
# - Rust std-dev-guide: #[must_use] when "failing to consider the output is
#   almost certainly a bug". Apply to: pure getters, builders returning Self,
#   Result-returning methods. Do NOT apply to: fire-and-forget patterns,
#   methods with useful side effects, Debug/Display impls.
# - redundant_closure: replace |x| foo(x) with foo when foo is a function
#   item (not a closure variable). Preserves clarity.
# - format_push_string: replace s.push_str(&format!(...)) with
#   write!(s, ...).unwrap() using std::fmt::Write. Avoids intermediate
#   String allocation.
# - wildcard_enum_match_arm: enumerate all variants explicitly so new
#   variants cause compile errors. Use _ only for #[non_exhaustive] enums.
# - items_after_statements: move inner fn/struct/impl declarations before
#   the first statement in the block, or extract to module scope.
# - Casts: use TryFrom/TryInto for fallible conversions, From for infallible
#   widening. Only #[allow] when the domain guarantees safety (e.g., token
#   counts that never exceed i64::MAX).
# - doc_markdown: wrap identifiers, types, and code fragments in backticks.
#   Wrap bare URLs in angle brackets or proper markdown links.
# =============================================================================

# ===========================================================================
# LAYER 0 -- Code semantics: changes to signatures, expressions, types
# ===========================================================================

[units.P01]
name = "Add #[must_use] attributes across all crates"
summary = '''
Add #[must_use] to methods, functions, and -> Self builders per the
Rust std-dev-guide policy: apply when "failing to explicitly consider
the output is almost certainly a bug". This covers: (1) Pure accessor
methods returning owned values (e.g., fn name() -> &str, fn id() ->
String). (2) Builder methods returning Self (e.g., fn with_model(self,
m: &str) -> Self). (3) Functions returning Result where ignoring the
error is always wrong. (4) Functions returning bool/Option where
ignoring means lost information. DO NOT apply to: methods with useful
side effects (e.g., println-like, state mutation), fire-and-forget
patterns (e.g., spawn), Display/Debug trait impls.'''
layer = 0
tier = 1
status = "pending"
depends_on = []
blocks = ["P12"]
estimated_warnings_pct = 26
estimated_loc = "YOUR_MUST_USE_COUNT * 1.1"
files_create = []
files_modify = ["DISCOVER_VIA_CLIPPY"]
acceptance = [
  "All clippy::return_self_not_must_use warnings resolved",
  "All clippy::must_use_candidate warnings resolved for methods and functions",
  "No #[must_use] applied to methods with side effects (e.g., println, state mutation)",
  "No #[must_use] applied to trait method implementations (Display, Debug, etc.)",
  "Builder methods returning Self annotated with #[must_use]",
  "Result-returning public functions annotated with #[must_use]",
  "Zero test regressions",
]
produces = ["ART:must-use"]
consumes = []
critical_decisions = [
  "Follow std-dev-guide: only apply when ignoring output is almost certainly a bug.",
  "Builders returning Self always get #[must_use] -- discarding a builder mid-chain is always wrong.",
  "Trait method impls do NOT get #[must_use] -- the trait defines the contract.",
  "Test helper functions do NOT get #[must_use] -- test assertions handle correctness.",
]
rationale = '''
Typically the single largest category (~26% of all pedantic warnings).
Mechanically safe -- #[must_use] is additive and never changes runtime behavior.'''

[units.P01.clippy_discovery]
description = "Find all files affected by must_use warnings"
command = '''
cargo clippy --workspace --all-targets -- -W clippy::pedantic 2>&1 \
  | grep -E 'clippy::must_use_candidate|clippy::return_self_not_must_use' \
  | sed 's/.*--> //' | cut -d: -f1 | sort -u'''

[units.P02]
name = "Replace redundant closures and simplify Option/Result combinators"
summary = '''
Fix warnings across two related categories: (1) redundant_closure:
replace |x| foo(x) with foo, |x| Foo::new(x) with Foo::new, etc.
Only when the replacement is a direct function/constructor -- not
when the closure captures variables. (2) map_unwrap_or +
map_or/map_or_else: replace .map(f).unwrap_or(default) with
.map_or(default, f) or .map_or_else(default_fn, f). The combined
form is more idiomatic and avoids an unnecessary intermediate Option.'''
layer = 0
tier = 1
status = "pending"
depends_on = []
blocks = ["P12"]
estimated_warnings_pct = 7
estimated_loc = "YOUR_CLOSURE_COUNT * 1.2"
files_create = []
files_modify = ["DISCOVER_VIA_CLIPPY"]
acceptance = [
  "Zero clippy::redundant_closure warnings remain",
  "Zero clippy::map_unwrap_or warnings remain",
  "Zero clippy::map_or / clippy::option_map_or_none / clippy::result_map_or_into_option warnings remain",
  "No closure replacements where the closure captures external variables",
  "Zero test regressions",
]
produces = ["ART:closures-combinators"]
consumes = []
critical_decisions = [
  "Only replace closures with function items, not closure variables -- |x| some_var(x) keeps the closure.",
  "map_or preferred over map().unwrap_or() for readability and single-evaluation guarantee.",
  "map_or_else when the default is expensive to compute (closure, not a constant).",
]
rationale = '''
Mechanical refactors that improve idiomatic Rust usage. No behavioral change.
Typically ~7% of pedantic warnings.'''

[units.P02.clippy_discovery]
description = "Find all files affected by closure/combinator warnings"
command = '''
cargo clippy --workspace --all-targets -- -W clippy::pedantic 2>&1 \
  | grep -E 'clippy::redundant_closure|clippy::map_unwrap_or' \
  | sed 's/.*--> //' | cut -d: -f1 | sort -u'''

[units.P03]
name = "Fix format string inefficiencies and uninlined format args"
summary = '''
Fix warnings in three categories: (1) format_push_string: replace
s.push_str(&format!(...)) with write!(s, ...).unwrap() using
std::fmt::Write. This eliminates an intermediate String allocation.
(2) uninlined_format_args: replace format!("{}", x) with
format!("{x}") using Rust 2021+ inline format syntax. (3)
format_in_format_args: replace format!() nested inside another
format macro with direct interpolation. All are mechanical
transformations that improve performance and readability.'''
layer = 0
tier = 1
status = "pending"
depends_on = []
blocks = ["P12"]
estimated_warnings_pct = 5
estimated_loc = "YOUR_FORMAT_COUNT * 1.3"
files_create = []
files_modify = ["DISCOVER_VIA_CLIPPY"]
acceptance = [
  "Zero clippy::format_push_string warnings remain",
  "Zero clippy::uninlined_format_args warnings remain",
  "Zero clippy::format_in_format_args warnings remain",
  '''All push_str(&format!(...)) replaced with write!(s, ...).unwrap() using std::fmt::Write''',
  '''All format!("{}", var) replaced with format!("{var}")''',
  "use std::fmt::Write; import added where write! macro is used on Strings",
  "Zero test regressions",
]
produces = ["ART:format-strings"]
consumes = []
critical_decisions = [
  "write!(s, ...).unwrap() is safe because writing to a String never fails (fmt::Write for String is infallible).",
  '''Inline format args only when the expression is a simple variable -- format!("{}", foo.bar()) stays expanded for readability.''',
]
rationale = '''
The format_push_string fix has a real performance benefit (avoids allocation).
Inline args improve readability. Typically ~5% of pedantic warnings.'''

[units.P03.clippy_discovery]
description = "Find all files affected by format string warnings"
command = '''
cargo clippy --workspace --all-targets -- -W clippy::pedantic 2>&1 \
  | grep -E 'clippy::format_push_string|clippy::uninlined_format_args|clippy::format_in_format_args' \
  | sed 's/.*--> //' | cut -d: -f1 | sort -u'''

# ===========================================================================
# LAYER 0 continued -- More semantic changes
