[units.P13]
name = "Prohibit unwrap() and expect() in production code"
summary = '''
Systematically remove .unwrap() and .expect() from all production code
(crates/ excluding tests/). Replace with proper Result handling (?,
map_err, ok_or_else) or, in rare justified cases, keep expect() with a
detailed message that passes the 'useless message' test. Test code may
retain .unwrap()/.expect() but expect() messages must be descriptive.
Enable clippy::unwrap_used and clippy::expect_used as workspace-level
deny lints in clippy.toml or lib.rs.
(AI Slop: 'Unwrap Abuse' and 'Expect With Useless Messages'.)'''
