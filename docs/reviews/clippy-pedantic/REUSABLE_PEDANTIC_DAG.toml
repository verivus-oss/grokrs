# =============================================================================
# USAGE GUIDE
# =============================================================================

[usage]
description = '''
How to instantiate this template for a new Rust workspace.'''

[usage.steps]
step_1 = "Copy this file into your repo (e.g., docs/clippy-pedantic-dag.toml)."

step_2 = '''
Run the discovery commands in [discovery.commands] to measure your baseline.
Record the total warning count and per-category breakdown.'''

step_3 = "Fill in the [workspace] section with your actual numbers."

step_4 = '''
For each unit P01-P16, run the command in [units.PXX.clippy_discovery] to
get the list of affected files. Replace files_modify = ["DISCOVER_VIA_CLIPPY"]
with the actual file list.'''

step_5 = '''
Replace estimated_loc formulas (e.g., "YOUR_MUST_USE_COUNT * 1.1") with
actual numbers. The multiplier is a rule of thumb: ~1.1x for additive
annotations like #[must_use], ~2-3x for refactors that change control flow,
~2.2x for doc additions (each doc section is ~2 lines per warning).'''

step_6 = '''
Assign tiers based on your project priorities. The default tier assignments
work well for most projects: Tier 1 = highest ROI and safest to land first,
Tier 2 = important but more complex, Tier 3 = large volume or subjective.'''

step_7 = '''
Execute units in layer order (0 -> 1 -> 2 -> 3), respecting depends_on
edges. Within a layer, units without dependencies on each other can run
in parallel.'''

step_8 = '''
After each unit, verify acceptance criteria. Run the unit's clippy_discovery
command -- the count should be zero.'''

step_9 = '''
After all units complete, execute P12 (final validation) to confirm
everything integrates cleanly.'''

# =============================================================================
# CUSTOMIZATION GUIDE
# =============================================================================

[customization]
description = "Which units can be skipped or modified, and when."

[customization.skippable_units]
P08 = '''
Skip if your codebase has no functions over 100 lines, or if you have a
higher too-many-lines-threshold in clippy.toml. Also reasonable to skip
if you prefer the 'one cohesive block' style for complex state machines.'''

P11 = '''
Skip if your codebase has no trait patterns returning &str from impls.
This unit exists specifically for the pattern where a trait defines
fn name(&self) -> &str and implementations return string literals.'''

P13 = '''
Skip ONLY if you have no AI-assisted code in the project, or if you
already enforce clippy::unwrap_used at the workspace level. This is the
single highest-impact unit for AI-generated codebases.'''

P14 = '''
Skip ONLY if you already enforce clippy::indexing_slicing at the workspace
level. Otherwise, keep it -- index panics are a top runtime failure mode.'''

P15 = '''
Skip if your codebase already has consistent string conversion patterns
and no needless_collect warnings. Check with the discovery command first.'''

P16 = '''
Skip if your codebase has zero unsafe blocks (run discovery command).
If you have any unsafe blocks at all, this unit is mandatory.'''

[customization.always_keep]
description = '''
These units should NEVER be skipped. They represent the core pedantic
remediation work and the highest-ROI improvements.'''
units = ["P01", "P02", "P03", "P04", "P05", "P06", "P07", "P09", "P10", "P12"]

[customization.layer_dependencies]
description = '''
Layer ordering is critical. Layer 0 changes signatures and expressions.
Layer 1 moves code around. Layer 2 adds documentation. If you land
Layer 1 before Layer 0, you will have merge conflicts when Layer 0
changes the expressions that Layer 1 moved. Layer 2 is purely additive
and safe to run last. Layer 3 (P12) is always last -- it validates
everything.'''

[customization.adding_units]
description = '''
If your workspace has additional pedantic warnings not covered here,
add new units with IDs P17+ following the same structure. Common
additions: (1) clippy::module_name_repetitions -- rename types that
repeat the module name (e.g., config::ConfigError -> config::Error).
(2) clippy::similar_names -- rename variables with confusingly similar
names. (3) clippy::option_option -- flatten Option<Option<T>> to a
clearer type. (4) clippy::implicit_hasher -- add type parameter for
HashMap/HashSet arguments. Place new units in the appropriate layer
based on whether they change code semantics (Layer 0), structure
(Layer 1), or documentation (Layer 2).'''

[customization.ci_integration]
description = '''
After completing all units, add pedantic enforcement to CI. Options:
(1) Add -W clippy::pedantic to your CI clippy invocation. (2) Add
#![warn(clippy::pedantic)] to each crate's lib.rs/main.rs. (3) Use
clippy.toml for workspace-wide configuration. Option 2 is preferred
because it makes the policy visible in the source code and allows
per-crate overrides via #![allow(clippy::some_lint)].'''
