[units.P02]
name = "Replace redundant closures and simplify Option/Result combinators"
summary = """
Fix 52 warnings across two related categories: (1) redundant_closure \
(32): replace |x| foo(x) with foo, |x| Foo::new(x) with Foo::new, \
etc. Only when the replacement is a direct function/constructor — \
not when the closure captures variables. (2) map_unwrap_or (14) + \
map_or/map_or_else (6): replace .map(f).unwrap_or(default) with \
.map_or(default, f) or .map_or_else(default_fn, f). The combined \
form is more idiomatic and avoids an unnecessary intermediate Option."""
