[units.P04]
name = "Fix wildcard match arms and match/if-let simplifications"
summary = """
Fix 26 warnings: (1) wildcard_enum_match_arm (20): enumerate all \
variants explicitly instead of using _ catch-all. This ensures new \
enum variants added in the future cause compile errors rather than \
silently falling through. Exception: keep _ for #[non_exhaustive] \
external enums. (2) match → if-let simplification (3): replace \
match with a single non-wildcard arm with if let. (3) match → if \
equality check (1): replace match on a single value with an if. \
(4) identical match arms (2): merge arms that have identical bodies."""
