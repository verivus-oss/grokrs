[units.P05]
name = "Fix numeric casts with safe conversions"
summary = """
Fix 23 warnings across cast categories: (1) cast_possible_wrap (5): \
u64 as i64 — use i64::try_from(x).unwrap_or(i64::MAX) or \
.cast_signed() where safe. (2) cast_sign_loss (4): i64 as u64 — \
use u64::try_from(x).unwrap_or(0) or validate non-negative first. \
(3) cast_lossless (5): u32 as u64, i32 as i64 — use u64::from(x) \
or i64::from(x). (4) cast_possible_truncation (4): u64 as u32, \
u64 as usize, u64 as u16, f64 as usize — use try_into() with \
fallback or document safety with #[allow] + comment. (5) \
cast_precision_loss (3): i64 as f64 — use #[allow] with a \
justification comment (precision loss is inherent to f64 display). \
(6) assorted (2): i32 as u8 truncation + sign loss."""
