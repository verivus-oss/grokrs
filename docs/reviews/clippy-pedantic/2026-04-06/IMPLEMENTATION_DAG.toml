[units.P07]
name = "Fix items_after_statements: hoist inner items to block/module scope"
summary = """
Fix 54 warnings for items_after_statements. In Rust, items (fn, \
struct, impl, const) defined inside a function body are visible from \
the start of the enclosing block, not from their textual position. \
Placing them after executable statements is confusing because it \
suggests they depend on prior state. Fix by: (1) Moving inner \
helper functions to before the first statement in the block. (2) \
For complex helpers, extracting to module scope as pub(crate) or \
private functions. (3) For const items, moving to the top of the \
function or to module scope."""
