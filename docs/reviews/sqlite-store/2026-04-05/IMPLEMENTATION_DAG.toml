# ---------------------------------------------------------------------------
# LAYER 0 — Foundation: crate scaffold, connection, migrations
# ---------------------------------------------------------------------------

[units.U10]
name = "Crate scaffold and Store::open with pragmas"
summary = """
Create the grokrs-store crate with Cargo.toml (depends on grokrs-core + \
rusqlite with bundled feature), register it as a workspace member, and \
implement the Store struct. Store::open(workspace_root: &Path) creates \
or opens .grokrs/state.db under the workspace root, creating the \
.grokrs/ directory if absent. Sets file permissions to 0600 on creation. \
On every open: PRAGMA journal_mode=WAL, PRAGMA busy_timeout=5000, \
PRAGMA foreign_keys=ON. Store holds a single rusqlite::Connection. \
Store::close(self) calls PRAGMA wal_checkpoint(TRUNCATE) before drop. \
Path validation rejects absolute paths and .. traversal for the \
configured store path. Add .grokrs/ to the project .gitignore."""
layer = 0
tier = 1
status = "pending"
depends_on = []
blocks = ["U11", "U12", "U13", "U14", "U15", "U20", "U21", "U30", "U31"]
estimated_loc = 320
files_create = [
  "crates/grokrs-store/Cargo.toml",
  "crates/grokrs-store/src/lib.rs",
  "crates/grokrs-store/src/types.rs",
]
files_modify = [
  "Cargo.toml",
  ".gitignore",
]
acceptance = [
  "Store::open creates .grokrs/ directory and state.db if absent",
  "PRAGMA journal_mode returns 'wal' after open",
  "PRAGMA busy_timeout returns 5000 after open",
  "PRAGMA foreign_keys returns 1 after open",
  "database file permissions are 0600 on Unix",
  "Store::close checkpoints WAL before closing (WAL file truncated to zero)",
  "Store::open rejects paths containing '..' traversal",
  "Store::open rejects absolute store paths when configured via StoreConfig",
  "workspace member registered in root Cargo.toml",
  ".grokrs/ entry present in .gitignore",
]
produces = ["ART:store-connection"]
consumes = []
critical_decisions = [
  "Use rusqlite with bundled feature — no system SQLite dependency required.",
  "Single Connection, not a pool — single-process CLI does not need connection pooling.",
  "WAL mode is set unconditionally on every open — never fallback to rollback journal.",
  "File permissions set via std::fs::set_permissions, not rusqlite — portable across platforms.",
]
constraints = [
  "grokrs-store depends only on grokrs-core and rusqlite — no dependency on grokrs-cap, grokrs-policy, or grokrs-api.",
  "Database path must be workspace-relative; never outside the workspace root.",
  "Store must not expose the raw rusqlite::Connection publicly.",
]
failure_modes = [
  "WAL pragma silently ignored if database is in read-only mode.",
  "File permission 0600 is a no-op on Windows — document platform limitation.",
  "Concurrent opens from multiple processes corrupt without WAL — documented as single-process constraint.",
]
rationale = "The Store struct and its connection pragmas are the foundation every other unit builds on. Getting WAL, busy_timeout, and foreign_keys right here prevents subtle data integrity issues downstream."

[units.U11]
name = "Embedded binary migrations with version tracking"
summary = """
Implement a migration runner that embeds SQL migrations in the binary \
(not external files). Create a schema_version table to track the current \
version. Each migration has a monotonic integer version. On Store::open, \
run all pending migrations in order inside a single transaction. V1 \
migration creates all tables: sessions, transcripts, approvals, evidence, \
plus the schema_version table itself. Migration SQL is stored as const \
&str in a migrations module. The runner compares the current schema \
version against available migrations and applies only those with version \
greater than current."""
layer = 0
tier = 1
status = "pending"
depends_on = ["U10"]
blocks = ["U12", "U13", "U14", "U15", "U20", "U21", "U30", "U31"]
estimated_loc = 350
files_create = [
  "crates/grokrs-store/src/migrations/mod.rs",
  "crates/grokrs-store/src/migrations/v001.rs",
]
files_modify = [
  "crates/grokrs-store/src/lib.rs",
]
acceptance = [
  "fresh database runs all migrations and schema_version table shows current version",
  "database already at latest version skips all migrations",
  "database at version N applies only migrations > N",
  "migration failure rolls back the entire transaction — schema_version unchanged",
  "V1 migration creates sessions table with correct columns and types",
  "V1 migration creates transcripts table with foreign key to sessions",
  "V1 migration creates approvals table with foreign key to sessions",
  "V1 migration creates evidence table with foreign key to sessions",
  "foreign key constraint on transcripts.session_id is enforced (insert with nonexistent session_id fails)",
  "migration runner is idempotent — running twice on same database has no effect",
]
produces = ["ART:migration-framework", "ART:v1-schema"]
consumes = ["ART:store-connection"]
critical_decisions = [
  "Embed migrations as const &str rather than using refinery or external SQL files — zero runtime file dependencies.",
  "All V1 tables created in a single migration — sessions, transcripts, approvals, evidence are one atomic schema version.",
  "schema_version is a single-row table with version INTEGER, not a migration history log — simpler, sufficient for single-process CLI.",
]
constraints = [
  "Migrations must be backward-compatible — once shipped, a migration SQL string is immutable.",
  "Migration versions are strictly monotonic integers starting at 1.",
  "All DDL runs inside a single transaction per migration batch.",
]
failure_modes = [
  "SQLite does not support transactional DDL for all operations (e.g., ALTER TABLE in some cases) — mitigated by using only CREATE TABLE in V1.",
  "Corrupted schema_version row causes all migrations to re-run — mitigated by transaction wrapping.",
]
rationale = "Embedded migrations eliminate external file dependencies and ensure every binary carries its own schema evolution capability. Version tracking prevents duplicate application."

# ---------------------------------------------------------------------------
# LAYER 1 — Data access: sessions, transcripts, usage
# ---------------------------------------------------------------------------

[units.U12]
name = "Session persistence (create, transition, get, list_active)"
summary = """
Implement the sessions data access layer. Store exposes a sessions() \
method returning a SessionRepo handle. SessionRepo provides: \
create(id, trust_level) inserts a new session in Created state with \
timestamps; transition(id, new_state) updates state and updated_at, \
returning error if session does not exist; get(id) returns \
Option<SessionRecord>; list_active() returns sessions not in Closed \
or Failed state. Trust level stored as string matching grokrs-cap \
type names (Untrusted, InteractiveTrusted, AdminTrusted). State \
stored as string matching SessionState variants; Failed includes \
error message as 'Failed: <message>'. SessionRecord is a plain \
struct in types.rs. All mutations use transactions."""
layer = 1
tier = 1
status = "pending"
depends_on = ["U10", "U11"]
blocks = ["U13", "U14", "U20", "U30", "U31"]
estimated_loc = 280
files_create = [
  "crates/grokrs-store/src/session.rs",
]
files_modify = [
  "crates/grokrs-store/src/lib.rs",
  "crates/grokrs-store/src/types.rs",
]
acceptance = [
  "create inserts session with Created state and correct timestamps",
  "create with duplicate id returns an error (PRIMARY KEY violation)",
  "transition updates state and updated_at timestamp",
  "transition on nonexistent session_id returns a typed error (not found)",
  "transition to Failed state stores 'Failed: <message>' format",
  "get returns Some(SessionRecord) for existing session",
  "get returns None for nonexistent session",
  "list_active returns only sessions not in Closed or Failed state",
  "list_active returns empty vec when no active sessions exist",
  "trust_level roundtrips as exact string (Untrusted, InteractiveTrusted, AdminTrusted)",
  "timestamps are RFC 3339 formatted strings",
]
produces = ["ART:session-persistence"]
consumes = ["ART:store-connection", "ART:v1-schema"]
critical_decisions = [
  "Store trust_level and state as plain strings — grokrs-store does not depend on grokrs-cap or grokrs-session, avoiding compile-time coupling.",
  "SessionRepo is a borrow of the Store connection, not a separate owned type — keeps lifetime management simple.",
  "Failed state encodes error message inline as 'Failed: <msg>' rather than a separate column — matches the spec and avoids schema change.",
]
constraints = [
  "Session IDs are caller-provided strings, not auto-generated — the store is not responsible for ID generation.",
  "State values must match SessionState variant names exactly for interop with grokrs-session.",
  "All writes are transactional.",
]
failure_modes = [
  "State string mismatch between grokrs-session and grokrs-store causes silent data corruption — mitigated by string constants or validation.",
  "Concurrent transition calls on the same session (from different threads) — mitigated by single-process constraint and SQLite serialization.",
]
rationale = "Session persistence is the first consumer of the schema and validates the full create-read-update pattern that transcripts and usage build on."

[units.U13]
name = "API transcript logging (log_request, log_response, log_error, list_by_session)"
summary = """
Implement the transcripts data access layer. Store exposes a \
transcripts() method returning a TranscriptRepo handle. TranscriptRepo \
provides: log_request(session_id, endpoint, method, request_body) inserts \
a partial record with request_at timestamp and returns the transcript_id \
(i64 autoincrement); log_response(transcript_id, status_code, \
response_body, usage) updates the record with response_at, status_code, \
response_body, token counts (input_tokens, output_tokens, \
reasoning_tokens), and cost_in_usd_ticks; log_error(transcript_id, \
error) records a failed request with error message; \
list_by_session(session_id) returns all transcripts for a session \
ordered by request_at. TranscriptRecord in types.rs. Usage is passed \
as a TranscriptUsage struct with optional token counts and cost."""
layer = 1
tier = 1
status = "pending"
depends_on = ["U10", "U11", "U12"]
blocks = ["U14", "U20", "U30", "U31"]
estimated_loc = 310
files_create = [
  "crates/grokrs-store/src/transcript.rs",
]
files_modify = [
  "crates/grokrs-store/src/lib.rs",
  "crates/grokrs-store/src/types.rs",
]
acceptance = [
  "log_request inserts record and returns a positive transcript_id",
  "log_request sets request_at to current time in RFC 3339 format",
  "log_request with nonexistent session_id fails with foreign key violation",
  "log_response updates the matching transcript with response data",
  "log_response sets response_at to current time",
  "log_response stores input_tokens, output_tokens, reasoning_tokens, cost_in_usd_ticks from usage",
  "log_error sets the error field on the matching transcript",
  "log_error on already-completed transcript still succeeds (overwrites are acceptable)",
  "list_by_session returns transcripts ordered by request_at ascending",
  "list_by_session returns empty vec for session with no transcripts",
  "TranscriptRecord includes all columns from the transcripts table",
  "concurrent read during write does not block (WAL verification)",
]
produces = ["ART:transcript-persistence"]
consumes = ["ART:store-connection", "ART:v1-schema", "ART:session-persistence"]
critical_decisions = [
  "Two-phase logging (log_request then log_response/log_error) matches the async nature of API calls — request is logged before the response arrives.",
  "TranscriptUsage is a separate input struct, not the API crate's usage type — keeps grokrs-store decoupled from grokrs-api.",
  "cost_in_usd_ticks is i64 to match the xAI API convention (integer cost, not float).",
]
constraints = [
  "Foreign key on session_id is enforced — cannot log transcripts for nonexistent sessions.",
  "Request/response bodies are stored as-is (TEXT) — no scrubbing by the store. Transport layer strips API keys upstream.",
  "Transcript IDs are autoincrement integers, not UUIDs.",
]
failure_modes = [
  "log_response called with wrong transcript_id silently updates zero rows — must check affected row count and return error.",
  "Very large response bodies (multi-MB streaming responses) stored as TEXT may bloat the database — acceptable for CLI usage patterns.",
]
rationale = "Transcript logging is the audit trail that makes API usage observable. The two-phase pattern handles the request-response lifecycle cleanly."

[units.U14]
name = "Usage accumulation (session_totals, all_totals, UsageSummary)"
summary = """
Implement the usage aggregation layer. Store exposes a usage() method \
returning a UsageRepo handle. UsageRepo provides: \
session_totals(session_id) returns a UsageSummary with SUM of \
cost_in_usd_ticks, input_tokens, output_tokens, reasoning_tokens, and \
COUNT of requests for a single session; all_totals() returns the same \
aggregation across all sessions. UsageSummary struct: \
total_cost_ticks: i64, total_input_tokens: u64, \
total_output_tokens: u64, total_reasoning_tokens: u64, \
request_count: u64. Queries aggregate from the transcripts table. \
NULL token values treated as zero in aggregation. Sessions with no \
transcripts return a zero-valued UsageSummary."""
layer = 1
tier = 1
status = "pending"
depends_on = ["U10", "U11", "U13"]
blocks = ["U20", "U30", "U31"]
estimated_loc = 150
files_create = [
  "crates/grokrs-store/src/usage.rs",
]
files_modify = [
  "crates/grokrs-store/src/lib.rs",
  "crates/grokrs-store/src/types.rs",
]
acceptance = [
  "session_totals returns correct sums for a session with multiple transcripts",
  "session_totals returns zero-valued UsageSummary for session with no transcripts",
  "session_totals treats NULL token columns as zero (COALESCE behavior)",
  "all_totals aggregates across all sessions",
  "all_totals returns zero-valued UsageSummary when database has no transcripts",
  "cost_in_usd_ticks is i64 (can be negative for credits/adjustments)",
  "token counts are u64 (always non-negative)",
  "request_count matches COUNT(*) of transcript records",
]
produces = ["ART:usage-aggregation"]
consumes = ["ART:store-connection", "ART:v1-schema", "ART:transcript-persistence"]
critical_decisions = [
  "Aggregate queries run against the transcripts table directly — no separate usage accumulator table. Correct for single-process CLI with modest data volumes.",
  "COALESCE with 0 for all nullable numeric columns — prevents NULL propagation in SUM.",
]
constraints = [
  "UsageSummary is a plain struct, not an ORM model — it represents a query result, not a table row.",
  "Aggregation uses SQL SUM/COUNT, not Rust-side iteration — database does the work.",
]
failure_modes = [
  "Integer overflow in SUM for very large token counts — mitigated by u64 range being sufficient for any realistic usage.",
  "Slow query on large transcript tables without index — mitigated by session_id foreign key index.",
]
rationale = "Usage queries are the primary operator-facing feedback on API cost. Running them as SQL aggregations is efficient and correct."

