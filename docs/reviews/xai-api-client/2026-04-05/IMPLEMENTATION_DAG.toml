[units.U14]
name = "Streaming support"
summary = """
SSE-based streaming for both Responses and Chat Completions endpoints. \
Parse data: lines, handle data: [DONE] terminator, deserialize deltas \
into typed stream events. For Chat Completions: stream delta chunks \
with partial content, tool_call fragments, and optional usage in final \
chunk (stream_options.include_usage). For Responses: stream response \
events with output items. Expose as async Stream<Item = Result<Event>>. \
Function calls arrive as complete chunks, not streamed token-by-token."""
layer = 1
tier = 1
status = "done"
depends_on = ["U10", "U11"]
blocks = ["U16", "U30"]
estimated_loc = 420
spec_sections = ["Streaming"]
