[units.U23]
name = "Policy bridge: NetworkConnect gating"
summary = """
Define the PolicyGate trait, wire it into the transport, add ApiConfig \
to grokrs-core, and update the example config. The PolicyGate trait \
has a single method: fn evaluate(&self, effect: &Effect) -> Decision. \
The transport calls this before every outbound HTTP request with a \
NetworkConnect { host } effect. If the gate returns Deny, the request \
fails with PolicyDenied. If the gate returns Ask, the request fails \
with ApprovalRequired (approval broker does not exist yet). The CLI \
wires the real PolicyEngine; tests wire a stub that returns Allow. \
AppConfig gains api: Option<ApiConfig> with api_key_env (env var \
name, NOT the secret), base_url, timeout_secs, max_retries. Existing \
configs without [api] continue to load. summary() and show-config \
updated. Embedded test config updated."""
layer = 2
tier = 2
