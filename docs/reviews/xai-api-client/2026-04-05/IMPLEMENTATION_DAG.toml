[units.U11]
name = "HTTP transport layer"
summary = """
A thin async HTTP client wrapper around reqwest that handles: base URL \
(https://api.x.ai), bearer auth from XAI_API_KEY or config, request \
signing, retry with exponential backoff on 429/503, timeout, and \
structured error mapping into grokrs-core error types. Exposes \
send_json / send_sse / send_multipart primitives. Does NOT know about \
specific endpoints."""
layer = 0
tier = 1
status = "done"
depends_on = []
blocks = ["U12", "U13", "U14", "U15", "U17", "U21", "U22", "U23"]
estimated_loc = 380
spec_sections = ["Transport"]
spec_anchors = ["http-client", "auth", "retry", "error-handling"]
files_create = [
  "crates/grokrs-api/src/transport/mod.rs",
  "crates/grokrs-api/src/transport/client.rs",
  "crates/grokrs-api/src/transport/auth.rs",
  "crates/grokrs-api/src/transport/retry.rs",
  "crates/grokrs-api/src/transport/error.rs",
  "crates/grokrs-api/src/transport/sse.rs",
]
files_modify = ["crates/grokrs-api/Cargo.toml"]
acceptance = [
  "client reads XAI_API_KEY from environment or AppConfig",
  "requests include Authorization: Bearer header",
  "429 and 503 responses trigger exponential backoff up to configurable max retries",
  "non-2xx responses deserialize into ApiError with status code, message, and request_id",
  "SSE transport returns an async Stream of raw event strings",
]
produces = ["ART:http-transport"]
consumes = []
critical_decisions = [
  "Use reqwest as the HTTP backend — well-maintained, async, TLS built-in.",
  "SSE parsing is a thin line-protocol layer, not a full eventsource crate.",
]
constraints = [
  "Transport must pass through grokrs-policy for NetworkConnect before any outbound request.",
  "No endpoint-specific logic leaks into the transport layer.",
]
failure_modes = [
  "Retry logic without jitter causes thundering herd on rate limits.",
  "Unchecked SSE reconnect loops consume unbounded memory.",
]
rationale = "A shared, policy-gated transport ensures all API calls go through the same auth, retry, and audit path."

