[units.U10]
name = "API wire types: common"
summary = """
Serde types for shared xAI API primitives: message roles, content blocks \
(text, image_url, input_image), tool definitions, tool calls, tool results, \
usage objects (prompt_tokens_details, completion_tokens_details, \
cost_in_usd_ticks), model metadata, error envelope. These are the atoms \
that every endpoint request/response is built from."""
