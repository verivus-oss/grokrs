  "crates/grokrs-api/src/endpoints/chat.rs",
  "crates/grokrs-api/src/types/mod.rs",
]
acceptance = [
  "streaming response yields typed events as an async Stream",
  "data: [DONE] terminates the stream cleanly",
  "partial content deltas accumulate into a complete message",
  "function call chunks arrive whole, not fragmented",
  "stream_options.include_usage surfaces usage in the final chunk for Chat Completions",
  "connection drop mid-stream surfaces as a typed StreamError, not a panic",
]
produces = ["ART:streaming-support"]
consumes = ["ART:api-common-types", "ART:http-transport"]
critical_decisions = [
  "Expose streaming as futures::Stream rather than callback-based consumer pattern.",
