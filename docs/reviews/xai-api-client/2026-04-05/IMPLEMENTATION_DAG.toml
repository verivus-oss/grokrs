[units.U12]
name = "Responses API client"
summary = """
Typed client for the Responses API — the recommended xAI endpoint. \
POST /v1/responses (create), GET /v1/responses/{id} (retrieve), \
DELETE /v1/responses/{id} (delete). Request types: model, input \
(string | message array), instructions, tools, tool_choice, \
previous_response_id, store, stream, temperature, top_p, \
max_output_tokens, max_turns, reasoning (effort), text (format / \
json_schema), search_parameters. Response types: id, status, output \
(typed message/reasoning/tool_call items), usage with \
server_side_tool_usage_details. Supports stateful conversation \
chaining via previous_response_id."""
