[units.U54]
name = "BrokeredPolicyGate wrapping PolicyEngine + ApprovalBroker"
summary = """
Implement BrokeredPolicyGate in grokrs-approval/src/brokered_gate.rs. \
BrokeredPolicyGate holds an inner PolicyEngine (from grokrs-policy) and \
an Arc<dyn ApprovalBroker>. It implements PolicyGate (from grokrs-api). \
evaluate_network(host) calls the inner PolicyEngine to get a Decision. \
If Allow, return PolicyDecision::Allow. If Deny, return \
PolicyDecision::Deny. If Ask, call broker.request_approval() and map: \
Approved -> PolicyDecision::Allow, Denied -> PolicyDecision::Deny, \
Timeout -> PolicyDecision::Deny { reason: 'approval timed out' }. \
Because PolicyGate::evaluate_network is sync and ApprovalBroker is async, \
use tokio::runtime::Handle::current().block_on() to bridge the boundary. \
Document that this requires running inside a tokio runtime. Also support \
a session_id that is set at construction time (stored in the gate). \
The context string for the broker is formatted as \
'Network connection to {host}'. Add unit tests using AlwaysApproveBroker \
and AlwaysDenyBroker: Ask+Approved->Allow, Ask+Denied->Deny, \
Ask+Timeout->Deny, Allow passthrough, Deny passthrough."""
layer = 1
tier = 1
status = "pending"
depends_on = ["U50", "U51"]
blocks = ["U57", "U58", "U59", "U60"]
estimated_loc = 200
files_create = [
  "crates/grokrs-approval/src/brokered_gate.rs",
]
files_modify = [
  "crates/grokrs-approval/Cargo.toml",
  "crates/grokrs-approval/src/lib.rs",
]
acceptance = [
  "BrokeredPolicyGate implements PolicyGate trait from grokrs-api",
  "Allow from PolicyEngine passes through as PolicyDecision::Allow",
  "Deny from PolicyEngine passes through as PolicyDecision::Deny with reason",
  "Ask from PolicyEngine triggers broker.request_approval()",
  "Broker Approved maps to PolicyDecision::Allow",
  "Broker Denied maps to PolicyDecision::Deny with the denial reason",
  "Broker Timeout maps to PolicyDecision::Deny { reason: 'approval timed out' }",
  "session_id passed to broker.request_approval() matches construction-time value",
  "context string is 'Network connection to {host}'",
  "sync/async bridge uses tokio::runtime::Handle::current().block_on()",
  "unit tests with test stubs verify all five decision paths",
  "cargo test -p grokrs-approval passes",
  "cargo clippy --workspace --all-targets passes with zero warnings",
]
produces = ["ART:brokered-gate"]
consumes = ["ART:approval-trait", "ART:approval-types", "ART:test-stubs"]
critical_decisions = [
  "BrokeredPolicyGate lives in grokrs-approval, not grokrs-cli — it depends on grokrs-api (for PolicyGate trait) and grokrs-policy (for PolicyEngine), both of which are library crates.",
  "tokio::runtime::Handle::current().block_on() for sync-async bridge — acceptable because the CLI runs inside a tokio runtime.",
  "session_id is set at construction, not per-call — the gate is constructed once per session.",
]
constraints = [
  "Must not depend on grokrs-cli — the gate is a library component.",
  "grokrs-approval now depends on grokrs-api (for PolicyGate) and grokrs-policy (for PolicyEngine and Effect) — verify no circular dependencies.",
  "If PolicyGate becomes async in the future, remove the block_on bridge.",
]
failure_modes = [
  "block_on() called outside a tokio runtime panics — documented as a requirement, enforced by the CLI being the only production caller.",
  "block_on() inside a tokio worker thread causes a panic if the runtime is current-thread — use Handle::current() which works in both multi-thread and current-thread runtimes.",
]
rationale = "BrokeredPolicyGate is the integration point between the policy engine and the approval broker. It is the only production path through which Ask decisions reach the broker."

