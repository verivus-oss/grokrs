[units.U52]
name = "TerminalBroker with stdin/stderr I/O, timeout, and batch map"
summary = """
Implement TerminalBroker in grokrs-approval/src/terminal.rs. \
TerminalBrokerConfig struct with timeout: Duration and \
store: Option<Arc<Store>> (where Store is from grokrs-store). \
TerminalBroker holds the config and a batch map: \
Arc<Mutex<HashMap<(String, EffectType), ApprovalDecision>>>. \
On request_approval: (1) check batch map for (session_id, effect_type) — \
if found, persist batch-derived decision and return immediately; \
(2) write the prompt to stderr using the spec format; (3) read from \
stdin with tokio::time::timeout wrapping the read future; (4) parse \
input: y/yes -> Approved, n/no -> Denied, Y/yes-all -> Approved + insert \
batch map, N/no-all -> Denied + insert batch map, timeout -> Timeout; \
(5) on invalid input, print 'unrecognized input' to stderr and re-prompt \
with timeout reset; (6) persist the decision to the store if configured \
(best-effort, log warning on failure); (7) return the decision. \
Effect description for the prompt uses Display impl on Effect. \
The batch map is session-scoped — different session_ids have independent \
batch state. Implement Display for Effect in grokrs-policy if not present \
(or use a local formatting function). Add unit tests using simulated \
stdin (via trait abstraction or injected reader) for: approve, deny, \
invalid input retry, timeout, batch yes-all, batch no-all, batch recall \
on subsequent request, different sessions do not share batch state."""
layer = 1
tier = 1
status = "pending"
depends_on = ["U50", "U55"]
blocks = ["U57", "U58", "U59", "U60"]
