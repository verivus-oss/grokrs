[units.U50]
name = "ApprovalDecision enum, EffectType enum, and ApprovalBroker trait"
summary = """
Create the grokrs-approval crate. Register it as a workspace member in \
the root Cargo.toml. Add dependencies on grokrs-core and grokrs-policy. \
Add async-trait as a dependency. Define ApprovalDecision enum with three \
variants: Approved, Denied { reason: String }, Timeout. Derive Clone, \
Debug, PartialEq, Eq. Define EffectType enum with variants FsRead, \
FsWrite, ProcessSpawn, NetworkConnect. Derive Clone, Copy, Debug, Hash, \
PartialEq, Eq. Implement From<&Effect> for EffectType (strips payload). \
Implement Display for EffectType. Define the ApprovalBroker trait with \
async_trait: request_approval(&self, session_id: &str, effect: &Effect, \
context: &str) -> ApprovalDecision. Trait must be object-safe \
(dyn ApprovalBroker). Re-export all public types from lib.rs."""
