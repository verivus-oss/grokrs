[units.U57]
name = "CLI wiring: TerminalBroker + BrokeredPolicyGate construction"
summary = """
Update grokrs-cli to construct the approval broker at startup. Add \
grokrs-approval dependency to grokrs-cli/Cargo.toml. In the CLI startup \
path (main.rs or a dedicated wiring module), read session.approval_mode \
from AppConfig. When approval_mode is 'interactive': construct \
TerminalBroker with timeout from session.approval_timeout_secs (default \
30s) and optional store handle; wrap PolicyEngine + TerminalBroker in \
BrokeredPolicyGate; inject BrokeredPolicyGate as the PolicyGate for \
