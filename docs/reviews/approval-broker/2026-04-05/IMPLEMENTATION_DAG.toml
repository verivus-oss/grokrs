maps Ask to Deny (current behavior, can reuse existing gate or create \
a thin wrapper). When approval_mode is 'allow': use an AllowAllAskGate \
that maps Ask to Allow and logs a warning per approval; also log a \
startup warning: 'WARNING: approval_mode=allow -- all Ask decisions \
will be auto-approved. Do not use in production.' Validate that \
approval_mode is one of the three recognized values at startup; exit \
with error on unrecognized mode. Add tests for the wiring logic."""
