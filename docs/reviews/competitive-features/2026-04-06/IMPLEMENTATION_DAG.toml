  "Timeout is mandatory -- no unterminated child processes.",
  "Secret sanitization patterns are hardcoded, not configurable -- simple and predictable.",
  "Command is run via 'sh -c' on Unix for shell expansion support.",
]
failure_modes = [
  "Shell injection via crafted command strings -- mitigated by PolicyEngine gating ProcessSpawn before execution.",
  "Zombie processes if SIGKILL fails on obscure platforms -- acceptable for CLI usage.",
  "Output truncation for commands producing megabytes of output -- mitigate with configurable max_output_bytes (default 512KB).",
]
rationale = "Process spawning is the most dangerous tool capability. Environment sanitization and timeout enforcement make it safer even when PolicyEngine allows the spawn."

[units.U12]
name = "Interactive REPL core with readline, history, and slash commands"
summary = """
Create the interactive REPL loop as a new module in grokrs-cli. The \
REPL uses rustyline for readline with history persistence to \
.grokrs/chat_history. Supports slash commands parsed before sending \
to the API: /exit (quit REPL), /clear (reset conversation history), \
/model <name> (switch model for subsequent turns), /system <prompt> \
(set system instructions), /help (list available commands), \
/history (show conversation turn count and token usage). Non-slash \
input is treated as a user message. The REPL maintains a \
Vec<ConversationTurn> tracking user messages and assistant responses. \
Each turn stores the user input, assistant response text, and token \
usage. The REPL core is decoupled from the API client -- it accepts \
a trait ChatBackend with async fn send_message(&mut self, message: &str) \
-> Result<ChatResponse> so it can be tested with a mock backend. \
ChatResponse includes the response text, token usage, and optional \
previous_response_id for stateful chaining. Add rustyline dependency \
to grokrs-cli."""
