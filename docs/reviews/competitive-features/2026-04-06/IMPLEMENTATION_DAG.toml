[units.U15]
name = "AgentExecutor: policy-gated tool execution via run_tool_loop"
summary = """
Create AgentExecutor in grokrs-cli that drives a multi-turn agent \
conversation with tool execution, using run_tool_loop from grokrs-api \
with a synchronous FunctionExecutor implementation. The FunctionExecutor \
dispatches tool calls to the ToolRegistry via ErasedTool, with policy \
evaluation in between. Flow: (1) Construct a sync FunctionExecutor \
implementation (PolicyGatedExecutor) that holds references to \
ToolRegistry, PolicyEngine, and WorkspaceRoot. (2) On each tool call: \
look up the tool in the registry by name, call classify_json() to get \
effects, evaluate each effect through PolicyEngine, if all Allow then \
call execute_json(), if any Deny/Ask return error to model. (3) Pass \
this executor to run_tool_loop which handles the multi-turn dispatch \
automatically. (4) run_tool_loop repeats until model returns text \
output or max_iterations reached. Uses Session<T> state machine: \
transitions to RunningTurn on API call, WaitingApproval on Ask \
decision, back to RunningTurn on approval/denial."""
