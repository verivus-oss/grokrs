[units.U11]
name = "RunCommandTool with ProcessSpawn effect and output capture"
summary = """
Implement RunCommandTool in grokrs-tool that executes shell commands. \
Classifies as Effect::ProcessSpawn { program } where program is \
extracted from the command string (first whitespace-delimited token). \
Execute spawns the command via std::process::Command with working \
directory set to WorkspaceRoot, captures stdout and stderr, enforces \
a configurable timeout (default 30 seconds), and returns combined \
output as String. Stdin is closed (no interactive input). Environment \
is inherited but sanitized: XAI_API_KEY and any env var matching \
*_KEY, *_SECRET, *_TOKEN patterns are removed from the child process \
environment. Exit code is included in the returned string. Non-zero \
exit codes are not errors -- the tool returns the output regardless. \
Timeout kills the child process (SIGKILL on Unix) and returns a \
ToolError::Timeout. Implements the evolved ToolSpec trait from U10 \
(async execute with &WorkspaceRoot, description(), input_schema())."""
layer = 0
tier = 1
status = "done"
depends_on = []
blocks = ["U14", "U15"]
estimated_loc = 280
files_create = [
  "crates/grokrs-tool/src/tools/run_command.rs",
]
files_modify = [
  "crates/grokrs-tool/src/tools/mod.rs",
  "crates/grokrs-tool/src/error.rs",
]
acceptance = [
  "RunCommandTool classifies as ProcessSpawn with extracted program name",
  "RunCommandTool extracts first token as program name (e.g., 'ls -la' -> program='ls')",
  "RunCommandTool executes command with cwd set to WorkspaceRoot",
  "RunCommandTool captures both stdout and stderr in output",
  "RunCommandTool includes exit code in returned string",
  "RunCommandTool kills child process on timeout and returns ToolError::Timeout",
  "RunCommandTool sanitizes environment: removes XAI_API_KEY from child env",
  "RunCommandTool sanitizes environment: removes env vars matching *_KEY, *_SECRET, *_TOKEN patterns",
  "RunCommandTool closes stdin (no interactive input possible)",
  "RunCommandTool with non-zero exit code returns output (not an error)",
  "RunCommandTool implements description() and input_schema()",
  "Unit test: echo command returns expected output",
  "Unit test: timeout fires for sleep command exceeding limit",
  "Unit test: env sanitization removes test secret from child",
]
produces = ["ART:command-tool"]
consumes = []
critical_decisions = [
  "Environment sanitization strips secret-like vars by pattern -- defense in depth even though PolicyEngine gates the spawn.",
  "Timeout uses SIGKILL not SIGTERM -- ensures the child is killed even if it ignores SIGTERM.",
  "Combined stdout+stderr in output -- separate capture available but combined is simpler for model consumption.",
  "Non-zero exit is not an error -- the model needs to see compiler errors, test failures, etc.",
]
constraints = [
