[units.U13]
name = "GrokChatBackend: wire REPL to GrokClient with streaming output"
summary = """
Implement GrokChatBackend that implements the ChatBackend trait from \
U12, wiring the REPL to GrokClient. Each send_message call constructs \
a CreateResponseRequest with the user message, current model, system \
instructions (if set via /system), and previous_response_id (if \
stateful mode). Sends via ResponsesClient::create_stream() for \
token-by-token output. Streaming tokens are printed to stdout as they \
arrive (same pattern as existing run_chat). On response completion, \
extracts usage from the ResponseCompleted event and returns a \
ChatResponse with the full text, usage, and response_id. Supports \
two conversation modes: stateless (local history via input messages \
array) and stateful (server-side via previous_response_id with \
store=true). Default is stateless (store=false) matching the \
fail-closed posture. --stateful flag opts into server-side chaining. \
Policy gate is evaluated before the first API call -- if network is \
denied, the REPL prints a helpful error and exits before entering \
the loop. Requires U09 approval bypass so that network Ask decisions \
can resolve to Allow when approval_mode = 'allow'."""
