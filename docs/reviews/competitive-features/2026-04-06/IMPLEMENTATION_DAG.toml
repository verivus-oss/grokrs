# ---------------------------------------------------------------------------
# SCOPING DECISIONS (post-review amendments)
# ---------------------------------------------------------------------------
# 1. U09 added: minimal approval bypass for networked features. Without this,
#    allow_network = true yields Decision::Ask which becomes ApprovalRequired
#    and all networked commands are non-functional. U09 is a temporary escape
#    hatch (approval_mode = "allow" in config) until the full approval broker
#    (spec 03) is implemented. All networked units depend on U09.
# 2. U36 (trait evolution) folded into U10 -- U10/U11 need the evolved traits
#    at implementation time, not after.
# 3. U25 (agent search) merged into U17 -- search flags are just request
#    construction and tool_loop already handles server-side tools.
# 4. U20/U21 dependencies on U14/U15 removed -- media generation and model
#    discovery use endpoint clients directly, not the tool registry.
# 5. U14 rewritten to use trust_rank() ordering, ErasedTool object-safe
#    wrapper, and flat Responses API function definition format.
# 6. U22/U24 now depend on U23 (store extensions). U23 adds V2 migration
#    with ON DELETE CASCADE and find_by_prefix.
# ---------------------------------------------------------------------------

# ===========================================================================
# LAYER 0 -- Foundation: approval gate, tool traits, REPL core, trust gates
# ===========================================================================

[units.U09]
name = "Minimal approval bypass: reuse session.approval_mode for networked effects"
summary = """
The existing SessionConfig already has an approval_mode field \
(values: 'interactive', 'deny', 'allow'; default 'interactive'). \
Reuse this field in ALL CLI policy bridges (FnPolicyGate in \
commands/api.rs AND commands/collections.rs) to resolve Decision::Ask: if approval_mode = \
'allow', map Ask to Allow; if 'deny', map Ask to Deny; if \
'interactive', keep Ask (which becomes ApprovalRequired until the \
approval broker from spec 03 is built). This avoids creating a \
second source of truth. Update the example config comment under \
[session] explaining the approval_mode values. Add unit tests \
verifying all three modes in the policy bridge."""
layer = 0
tier = 1
status = "done"
depends_on = []
