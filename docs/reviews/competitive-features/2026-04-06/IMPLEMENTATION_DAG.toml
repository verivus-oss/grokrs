[units.U10]
name = "ToolSpec trait evolution and implementations for read_file, write_file, list_directory"
summary = """
Evolve the ToolSpec and Classify traits in grokrs-tool, then implement \
three concrete filesystem tools. Trait changes: ToolSpec gains \
description() -> &str and input_schema() -> serde_json::Value methods \
for registry integration. ToolSpec::execute signature extended to \
async fn execute(&self, input: Self::Input, root: &WorkspaceRoot) -> \
Result<Self::Output, ToolError>. Classify::classify returns \
Result<Vec<Effect>, ToolError> instead of Vec<Effect>. Add ToolError \
with variants: PathValidation, Io, Timeout, PermissionDenied, Other. \
Use async_trait if MSRV < 1.75. Then implement ReadFileTool: accepts a \
relative path string, classifies as Effect::FsRead(WorkspacePath), \
executes by reading the file content relative to WorkspaceRoot and \
returning the content as String. WriteFileTool: accepts a relative path \
and content string, classifies as Effect::FsWrite(WorkspacePath), \
executes by writing content to the resolved path. ListDirectoryTool: \
accepts a relative path, classifies as Effect::FsRead(WorkspacePath), \
executes by listing directory entries. All tools validate paths \
through WorkspacePath::new() -- absolute paths, '..' traversal, \
and empty paths are rejected at classification time. Each tool returns \
a Result<String, ToolError>. Add grokrs-cap dependency to grokrs-tool \
for WorkspacePath/WorkspaceRoot."""
