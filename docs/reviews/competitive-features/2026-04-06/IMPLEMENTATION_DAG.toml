[units.U24]
name = "Chat REPL session persistence with SQLite store integration"
summary = """
Integrate the REPL (U12/U13/U16) with grokrs-store for persistent \
session tracking. Depends on U23 for find_by_prefix. On REPL start: \
create a session in the store with UUID v4 ID and Untrusted trust \
level. Each conversation turn: log_request before sending (with the \
user message as body), log_response after receiving (with the \
assistant response and token usage). On /exit: transition session to \
Closed. On error: transition to Failed. On REPL reconnect with \
--resume <session_id>: load the previous session's conversation \
history from transcripts and reconstruct the conversation state. \
The --resume flag requires a valid session ID (prefix match supported \
via find_by_prefix from U23). If the session was in Closed state, \
it is reopened. Store integration is best-effort: REPL works without \
persistence (e.g., no store configured)."""
