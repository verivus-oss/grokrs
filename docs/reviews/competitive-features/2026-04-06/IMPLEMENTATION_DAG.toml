[units.U20]
name = "CLI commands: grokrs generate image and grokrs generate video"
summary = """
Add 'grokrs generate' subcommand group with 'image' and 'video' \
subcommands. These commands use the existing ImagesClient and \
VideosClient endpoint clients directly -- they do NOT need the \
ToolRegistry or AgentExecutor. Image generation: 'grokrs generate \
image <prompt>' sends to ImagesClient::generate(), downloads the \
result (URL or base64), and writes to --output <path> (required). \
Supports --edit <input.png> for image editing via ImagesClient::edit(). \
Flags: --model <name>, --aspect-ratio <ratio>, --quality <quality>, \
--resolution <resolution>, --format <url|b64_json>. Video generation: \
'grokrs generate video <prompt>' sends to VideosClient::generate(), \
polls with progress display using VideosClient::poll_until_done(). \
Video output is URL-only: the CLI prints the video URL to stdout \
and does NOT download the binary. If file_id is present in the \
response, it is also printed. The user downloads separately. This \
avoids arbitrary binary download through the CLI and simplifies \
the security surface. Supports --extend <input.mp4> for video \
extension. Flags: --model <name>, --duration <seconds>, --aspect-ratio, \
--resolution. Image output paths are validated through WorkspacePath \
(FsWrite effect evaluated by PolicyEngine). Input file paths for \
editing validated through WorkspacePath (FsRead effect). Progress \
display for video polling shows percentage and elapsed time on stderr. \
Requires U09 approval bypass for network access."""
