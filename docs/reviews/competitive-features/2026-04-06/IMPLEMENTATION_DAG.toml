[units.U14]
name = "ToolRegistry with trust_rank ordering, ErasedTool wrapper, Responses API format"
summary = """
Create a ToolRegistry in grokrs-tool that manages available tools and \
gates them by trust level. First, add a trust_rank() -> u8 method to \
the TrustLevel trait in grokrs-cap: Untrusted=0, InteractiveTrusted=1, \
AdminTrusted=2. This provides a runtime ordering API for trust levels. \
Second, create an object-safe ErasedTool trait that wraps ToolSpec for \
registry dispatch. ToolSpec has associated types (Input, Output) which \
make it non-object-safe; ErasedTool provides execute_json(&self, \
args: serde_json::Value, root: &WorkspaceRoot) -> Result<String, \
ToolError> and classify_json(&self, args: serde_json::Value) -> \
Result<Vec<Effect>, ToolError>, plus name(), description(), and \
input_schema(). A blanket impl of ErasedTool for any T: ToolSpec \
where T::Input: DeserializeOwned handles the JSON deserialization. \
Third, the registry maps tool names to Box<dyn ErasedTool> with an \
associated minimum trust_rank. Registration: register(tool: Box<dyn \
ErasedTool>, min_rank: u8). Querying: available_tools(rank: u8) \
returns tools whose min_rank <= requested rank. tool_definitions() \
returns function definitions in the flat Responses API format \
(FunctionToolDefinition: { type: 'function', name, description, \
parameters }) -- NOT the nested Chat Completions format. ToolRegistry \
is constructed per session."""
layer = 0
tier = 1
status = "done"
depends_on = ["U10", "U11"]
blocks = ["U15", "U18"]
estimated_loc = 350
files_create = [
  "crates/grokrs-tool/src/registry.rs",
