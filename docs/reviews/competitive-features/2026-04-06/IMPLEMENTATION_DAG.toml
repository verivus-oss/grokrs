foreign key (or recreate the table with the constraint if ALTER is \
not supported by SQLite). This ensures delete_old does not leave \
orphaned transcript rows. Methods: list_all(limit: Option<u32>) \
returns all sessions ordered by updated_at descending, with optional \
limit. list_by_state(state: &str) returns sessions matching the given \
state. delete_old(state: &str, older_than_secs: i64) deletes sessions \
in the given state where updated_at is older than the threshold, \
returns count of deleted rows. Transcript deletion is handled by \
ON DELETE CASCADE; if CASCADE is not feasible, delete_old explicitly \
deletes associated transcripts in the same transaction before \
deleting the session. count_transcripts(session_id: &str) returns the \
number of transcript entries for a session. find_by_prefix(prefix: \
&str) returns sessions whose ID starts with the given prefix (for \
partial ID matching in U22 and U24). All methods use parameterized \
queries (no SQL injection)."""
