critical_decisions = [
  "trust_rank() on TrustLevel trait provides runtime ordering without exposing trust level internals -- simple u8 comparison.",
  "ErasedTool wraps ToolSpec for object safety -- the registry needs dynamic dispatch since tools have different Input/Output types.",
  "Flat Responses API FunctionToolDefinition format (not nested Chat format) -- matches the xAI Responses API wire format used by grokrs-api.",
  "Registry is not a global singleton -- constructed per session with the appropriate trust level.",
]
