]
acceptance = [
  "Resolver checks the configured env var first",
  "Resolver returns typed auth errors when no credential source succeeds",
  "Resolver does not write secret material to disk, logs, or transcript state",
]
produces = ["ART:auth-resolver"]
consumes = ["ART:auth-config-model"]
critical_decisions = [
  "Resolution order is explicit: env first, secure provider second.",
]
constraints = [
  "The resolver may keep the secret in process memory only.",
]
failure_modes = [
