summary = """
The xAI API returns per-tool call counts in usage: \
code_interpreter_calls, document_search_calls, file_search_calls, \
mcp_calls, web_search_calls, x_search_calls. We already have \
ServerSideToolUsageDetails wired as Option<Vec<...>> on the usage \
structs. This unit adds the typed per-call-count fields to \
ServerSideToolUsageDetails and verifies the existing wiring. \
Also add cost_in_nano_usd: Option<i64> to ResponsesUsage and Usage."""
