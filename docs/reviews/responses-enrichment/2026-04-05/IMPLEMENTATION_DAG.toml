enrichments. ReasoningConfig gains generate_summary (bool) and \
summary (ReasoningSummary enum: auto/concise/detailed). \
CreateResponseRequest gains include (Vec<String>), \
context_management (Vec<Value>), and prompt_cache_key (String). \
CreateResponseBuilder gains setter methods for all new fields. \
Also verify search_parameters is properly typed."""
