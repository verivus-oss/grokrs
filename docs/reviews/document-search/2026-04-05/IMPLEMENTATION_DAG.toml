critical_decisions = [
  "score as f64 — this is a similarity score, not a monetary value.",
  "filter as String — AIP-160 filter expressions are complex; typed parsing deferred.",
  "fields as HashMap<String, serde_json::Value> for user-defined metadata fields.",
]
constraints = [
  "Types must not depend on Collections Management API types.",
]
failure_modes = [
  "RankingMetric serde rename doesn't match xAI wire format.",
]
rationale = "Document search is the primary consumer-facing Collections endpoint using the inference API key."

