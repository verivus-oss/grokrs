# ---------------------------------------------------------------------------
# LAYER 0 — Types
# ---------------------------------------------------------------------------

[units.U60]
name = "Document search wire types"
summary = """
Serde types for POST /v1/documents/search. Request: query (string), \
source (DocumentsSource with collection_ids Vec<String>), filter \
(AIP-160 filter expression string), group_by (Option<String>), \
ranking_metric (L2/cosine enum), retrieval_mode (Option<RetrievalMode> \
with typed mode_type field), limit (Option<u32>). Response: matches \
(Vec<SearchMatch>) where SearchMatch has file_id, chunk_id, \
chunk_content, score (f64), collection_ids, fields (HashMap), \
page_number (Option<u32>)."""
