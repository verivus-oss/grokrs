# LAYER 1 — Endpoint client
# ---------------------------------------------------------------------------

[units.U61]
name = "Document search endpoint client"
summary = """
Endpoint client for POST /v1/documents/search. Uses the standard \
inference API key (not management key). Sends query with collection IDs \
and optional filters, returns ranked matches. Add to GrokClient facade \
as client.documents().search(). Add CLI subcommand: \
grokrs api search '<query>' --collection <id>."""
