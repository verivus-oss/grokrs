tier = 1
status = "planned"
depends_on = []
blocks = ["U61"]
estimated_loc = 120
spec_sections = []
spec_anchors = []
files_create = [
  "crates/grokrs-api/src/types/documents.rs",
]
files_modify = [
  "crates/grokrs-api/src/types/mod.rs",
]
acceptance = [
  "DocumentSearchRequest with source: DocumentsSource (wrapping collection_ids) and correct serde attributes",
  "DocumentsSource struct with collection_ids: Vec<String>",
  "RetrievalMode struct with mode_type field (serde renamed to 'type')",
  "DocumentSearchResponse with matches: Vec<SearchMatch>",
  "SearchMatch with file_id, chunk_id, chunk_content, score, collection_ids, fields, page_number",
  "RankingMetric enum with L2 and Cosine variants",
  "all Option fields use skip_serializing_if",
  "serde round-trip tests for request and response",
  "cargo clippy --workspace --all-targets passes with zero warnings",
]
