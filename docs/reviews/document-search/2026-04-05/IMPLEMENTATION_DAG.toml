  "crates/grokrs-api/src/client.rs",
  "crates/grokrs-cli/src/commands/api.rs",
  "crates/grokrs-cli/src/main.rs",
]
acceptance = [
  "DocumentsClient with search() method sending POST to /v1/documents/search",
  "GrokClient gains documents() accessor returning DocumentsClient",
  "CLI: grokrs api search 'query' --collection <id> prints ranked results",
  "CLI: search respects policy engine (network must be allowed)",
  "wiremock integration test for search request/response",
  "cargo clippy --workspace --all-targets passes with zero warnings",
]
produces = ["ART:document-search-client", "OUT:search-cli"]
consumes = ["ART:document-search-types", "ART:http-transport"]
critical_decisions = [
  "Single documents() accessor on GrokClient rather than search() at top level.",
