[units.U40]
name = "Replace extract_host() with url::Url parser"
summary = """
The hand-rolled extract_host() in transport/client.rs splits on '://', \
'/', and ':' to extract the hostname from base_url. This is not \
RFC 3986 compliant — a URL with userinfo like \
https://api.x.ai:443@evil.example/v1 fools the parser into returning \
'api.x.ai' while reqwest connects to 'evil.example'. Replace with \
url::Url::parse().host_str() and reject URLs with username/password \
or without a host. Add the 'url' crate as a workspace dependency."""
layer = 0
tier = 1
status = "done"
depends_on = []
blocks = []
estimated_loc = 80
spec_sections = ["Policy Integration"]
spec_anchors = ["network-gating", "policy-bridge"]
files_create = []
files_modify = [
  "Cargo.toml",
  "crates/grokrs-api/Cargo.toml",
  "crates/grokrs-api/src/transport/client.rs",
  "crates/grokrs-api/src/transport/error.rs",
]
acceptance = [
  "extract_host() uses url::Url::parse().host_str() instead of manual string splitting",
  "new TransportError::InvalidBaseUrl variant added to transport/error.rs for malformed or userinfo-containing URLs",
  "check_policy_gate() rejects URLs with userinfo (@ in authority) via TransportError::InvalidBaseUrl — fail-closed",
  "check_policy_gate() rejects URLs without a parseable host via TransportError::InvalidBaseUrl",
  "existing tests continue to pass (https://api.x.ai, http://localhost:8080/v1, etc.)",
  "new test: check_policy_gate with base_url 'https://api.x.ai:443@evil.example/v1' returns TransportError::InvalidBaseUrl",
  "new test: check_policy_gate with base_url 'not-a-url' returns TransportError::InvalidBaseUrl",
  "new test: check_policy_gate with base_url 'http://127.0.0.1:PORT' succeeds (no false rejection of test URLs)",
  "cargo clippy --workspace --all-targets passes with zero warnings",
]
produces = ["ART:secure-host-extraction"]
consumes = []
critical_decisions = [
  "Use the url crate (well-maintained, RFC 3986 compliant) rather than improving manual parsing.",
  "Reject URLs with userinfo rather than stripping it — fail-closed on ambiguous URLs.",
]
constraints = [
  "Must not break the existing default base_url https://api.x.ai.",
  "Must not break localhost/loopback URLs used in wiremock integration tests.",
]
failure_modes = [
  "Over-strict URL validation rejects valid test server URLs (e.g., http://127.0.0.1:PORT).",
]
rationale = """
Defense-in-depth fix. The base_url is currently operator-controlled TOML \
config, so not directly exploitable, but correct URL parsing prevents \
future vulnerabilities if dynamic URL sources are ever added. The url \
crate is already a transitive dependency via reqwest."""

[units.U41]
name = "Filter OutputItem variants in stateless tool loop"
summary = """
In stateless mode (store=false), run_tool_loop() in tool_loop.rs \
serializes ALL OutputItem variants from the previous response back \
into the follow-up input array. This includes server-output-only \
variants (Reasoning, WebSearchCall, XSearchCall, CodeInterpreterCall, \
FileSearchCall, McpCall) that are not valid input types. The xAI API \
would reject these with HTTP 400. Fix: filter to only replay Message, \
FunctionCall, and FunctionCallOutput variants. Skip all others."""
layer = 0
tier = 1
status = "done"
depends_on = []
blocks = []
estimated_loc = 40
spec_sections = ["Tools and Function Calling"]
spec_anchors = ["function-calling-loop"]
files_create = []
files_modify = [
  "crates/grokrs-api/src/tool_loop.rs",
]
acceptance = [
  "stateless mode only replays Message, FunctionCall, and FunctionCallOutput items",
  "Reasoning, WebSearchCall, XSearchCall, CodeInterpreterCall, FileSearchCall, McpCall, and Unknown variants are skipped",
  "stateful mode (Mode A) is unchanged — it clears conversation each iteration",
  "existing tool_loop tests continue to pass",
  "new test: stateless mode with a response containing Reasoning + FunctionCall only replays the FunctionCall",
  "cargo clippy --workspace --all-targets passes with zero warnings",
]
produces = ["ART:correct-tool-loop"]
consumes = []
critical_decisions = [
  "Explicit match on allowed variants rather than a denylist — new OutputItem variants default to skipped (fail-safe).",
]
constraints = [
  "Must not change Mode A (stateful) behavior.",
  "Must not break the existing function calling loop tests.",
]
failure_modes = [
  "Filtering too aggressively could drop FunctionCall items needed for the loop to continue.",
]
rationale = """
Correctness fix. Mixed server-side and client-side tool calls in the \
same response would break the stateless tool loop with an API error. \
The fix ensures only input-compatible items are replayed."""

