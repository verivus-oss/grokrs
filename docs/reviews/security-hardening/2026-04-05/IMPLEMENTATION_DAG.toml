[units.U43]
name = "Emit error on truncated SSE frame at EOF"
summary = """
When the underlying byte stream ends with a non-empty partial line \
in the buffer (no trailing newline), SseStream returns None silently, \
discarding the incomplete event. This hides connection drops — the \
consumer sees a clean EOF when the response was actually truncated. \
Fix: at EOF, first drain all complete lines from the buffer (existing \
behavior), then on subsequent polls check if the residual trimmed \
buffer is non-empty and emit TransportError::Sse indicating an \
incomplete frame. This ensures buffers like 'data: ok\\ndata: trunc' \
yield 'ok' first, then error on the truncated residual."""
layer = 0
tier = 1
status = "done"
depends_on = []
blocks = []
estimated_loc = 45
spec_sections = ["Streaming"]
spec_anchors = ["sse-transport"]
files_create = []
files_modify = [
  "crates/grokrs-api/src/transport/sse.rs",
]
acceptance = [
  "at EOF, all complete lines in the buffer are drained and yielded first (existing behavior preserved)",
  "after draining complete lines, if residual trimmed buffer is non-empty, emit TransportError::Sse with message about incomplete frame",
  "EOF with empty buffer (or whitespace-only residual) returns None cleanly as before",
  "existing streaming tests continue to pass",
  "new test: stream with 'data: ok\\ndata: trunc' (no trailing newline) yields 'ok' then TransportError::Sse",
  "new test: stream ending mid-line without any complete lines produces an Sse error, not clean None",
  "new test: stream ending with only whitespace/empty buffer returns None (clean EOF)",
  "new test: normal stream with [DONE] followed by EOF continues to work without error",
  "cargo clippy --workspace --all-targets passes with zero warnings",
]
produces = ["ART:robust-sse-eof"]
consumes = []
critical_decisions = [
  "Trim whitespace before checking buffer emptiness — trailing \\r\\n or blank lines should not trigger false errors.",
  "Use TransportError::Sse variant (already exists) rather than adding a new error variant.",
]
constraints = [
  "Must not break normal stream termination where [DONE] is followed by EOF.",
  "Must not false-positive on trailing whitespace after the last complete event.",
]
failure_modes = [
  "Over-sensitive check fires on normal trailing whitespace/blank lines after [DONE].",
  "Naive 'buffer non-empty at EOF => error' fires before draining complete lines, dropping valid events.",
]
rationale = """
Robustness fix. Silent truncation hides network errors and can cause \
downstream consumers to believe a partial response is complete. \
Surfacing the error lets callers distinguish clean completion from \
connection loss."""

