ResponseStatus enum only has Completed, Incomplete, and Failed. The \
xAI API also returns 'in_progress' for in-flight responses (visible \
when polling via GET /v1/responses/{id}). Add an InProgress variant \
with #[serde(rename = 'in_progress')]. The streaming path already \
handles this via serde_json::Value and is unaffected."""
