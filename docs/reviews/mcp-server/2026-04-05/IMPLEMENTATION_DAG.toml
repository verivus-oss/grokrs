]
acceptance = [
  "JsonRpcRequest serializes/deserializes with method, params, and id fields",
  "JsonRpcResponse serializes with either result or error, never both",
  "JsonRpcNotification has no id field",
  "Request IDs handle both string and integer values (opaque client IDs)",
  "InitializeResult includes serverInfo with name='grokrs' and crate version",
  "ServerCapabilities advertises tools, resources, and prompts",
  "ToolDefinition includes name, description, and inputSchema (JSON Schema object)",
  "Protocol version constant is '2024-11-05'",
  "Version negotiation: client sends supported version, server accepts",
  "Version negotiation: client sends unsupported version, server responds with latest supported",
  "Dispatch routes 'initialize' to initialize handler",
  "Dispatch routes 'ping' to ping handler (returns empty result)",
  "Dispatch routes 'tools/list' to tool list handler",
  "Dispatch routes 'tools/call' to tool call handler",
  "Dispatch routes 'resources/list' to resource list handler",
  "Dispatch routes 'resources/read' to resource read handler",
  "Dispatch routes 'prompts/list' to prompt list handler",
  "Dispatch routes 'prompts/get' to prompt get handler",
  "Unknown method returns JsonRpcError with code -32601",
  "Malformed JSON input returns JsonRpcError with code -32700",
  "Batch requests are rejected (per MCP spec — no batch support)",
  "All types implement Clone, Debug, Serialize, Deserialize",
]
produces = ["ART:protocol-types", "ART:dispatch-framework"]
consumes = ["ART:mcp-crate-scaffold", "ART:mcp-error-types"]
critical_decisions = [
  "Request ID is an untagged enum (String | i64) — matches JSON-RPC 2.0 spec where ID is opaque.",
  "Dispatch is a function, not a trait — simpler than trait-based routing for a fixed protocol.",
  "Protocol types are their own module (src/protocol/) — clean separation from handler logic.",
  "No batch support — the MCP spec explicitly forbids batch JSON-RPC requests.",
]
constraints = [
  "All protocol types must match the MCP specification (2024-11-05 revision).",
  "Serialization must produce spec-compliant JSON — field names match MCP wire format exactly (camelCase).",
