End-to-end test that simulates an MCP client connecting via stdio \
transport. Spawn the grokrs mcp stdio process as a child, send MCP \
messages via stdin, read responses from stdout. Test the full flow: \
send initialize request, verify InitializeResult with correct \
capabilities and serverInfo. Send tools/list, verify registered tools \
appear. Send tools/call for a tool with Allow policy, verify successful \
result. Send tools/call for a tool with Deny policy, verify -32001 \
error. Send resources/list, verify workspace files appear. Send \
resources/read for a valid file, verify content. Send resources/read \
for a path with .. traversal, verify error. Send prompts/list, verify \
system and workspace-context prompts. Send prompts/get for workspace- \
context, verify it includes trust level and tool names. Send ping, \
verify empty result. Close stdin, verify process exits cleanly. \
Also test HTTP+SSE end-to-end: start server, connect via reqwest SSE, \
send initialize via POST, verify response on SSE stream, send \
tools/list, verify response. This validates the full stack from CLI \
entry point through transport through dispatch through handlers through \
policy engine and back. Uses tempdir for workspace with known files. \
Uses a test config TOML with [mcp] section configured."""
