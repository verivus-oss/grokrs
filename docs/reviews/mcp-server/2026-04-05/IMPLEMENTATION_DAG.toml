[units.U11]
name = "MCP protocol types and JSON-RPC 2.0 message framing"
summary = """
Implement the MCP protocol types in src/protocol/ module. JSON-RPC 2.0 \
message types: JsonRpcRequest (with method, params, id), JsonRpcResponse \
(result or error, id), JsonRpcNotification (method, params, no id), \
JsonRpcError (code, message, data). Request IDs are an enum of \
String | i64 to handle opaque client IDs. MCP-specific types: \
InitializeRequest (protocolVersion, capabilities, clientInfo), \
InitializeResult (protocolVersion, capabilities, serverInfo with \
name='grokrs' and version from crate), ServerCapabilities (tools, \
resources, prompts as optional capability objects), \
ToolDefinition (name, description, inputSchema), \
ToolCallRequest (name, arguments as serde_json::Value), \
ToolCallResult (content array with text/image items, isError flag), \
ResourceDefinition (uri, name, description, mimeType), \
ResourceReadRequest (uri), ResourceContent (uri, text or blob), \
PromptDefinition (name, description, arguments as list of PromptArgument), \
PromptArgument (name, description, required flag), \
PromptGetRequest (name, arguments map), PromptGetResult (description, \
messages array). PingRequest and PingResponse (empty). \
NotificationCancelled (params with requestId and optional reason). \
Protocol version constant: '2024-11-05'. Version negotiation logic: \
if client requests unsupported version, respond with latest supported. \
Implement Serialize/Deserialize for all types. Implement a dispatch \
function that routes incoming JsonRpcRequest by method string to typed \
handlers. Tests: round-trip serialization for all message types, version \
negotiation (supported version accepted, unsupported returns latest), \
dispatch routes initialize/ping/tools-list/tools-call/resources-list/ \
resources-read/prompts-list/prompts-get to correct handler stubs, \
unknown method returns MethodNotFound error, malformed JSON returns \
ParseError."""
layer = 0
tier = 1
status = "pending"
depends_on = ["U10"]
blocks = ["U12", "U13", "U14", "U15", "U16", "U20", "U21", "U22", "U23", "U30", "U31", "U32"]
