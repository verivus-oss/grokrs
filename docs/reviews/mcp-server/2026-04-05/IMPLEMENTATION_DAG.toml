  "crates/grokrs-mcp/src/lib.rs",
]
acceptance = [
  "StdioTransport reads newline-delimited JSON from stdin",
  "StdioTransport writes newline-delimited JSON to stdout",
  "Each message is one complete JSON object per line (no multi-line messages)",
  "Malformed JSON line produces a JsonRpcError response and continues reading",
  "EOF on stdin terminates the transport loop cleanly",
  "Notifications (no id) do not produce a response on stdout",
  "Diagnostic output (tracing) goes to stderr, never stdout",
  "notifications/cancelled signals cancellation to in-flight operations via CancellationToken",
  "Transport loop processes multiple sequential messages correctly",
  "StdioTransport::run integrates with McpServer dispatch",
  "In-memory pipe test verifies full request-response round-trip",
]
produces = ["ART:stdio-transport"]
consumes = ["ART:mcp-crate-scaffold", "ART:protocol-types", "ART:dispatch-framework"]
critical_decisions = [
  "Async via tokio — consistent with the rest of the crate's async model and required for tool timeout enforcement.",
  "CancellationToken from tokio_util for cooperative cancellation — allows in-flight tool calls to be cancelled on notifications/cancelled.",
  "Diagnostic output to stderr — matches existing grokrs convention and MCP spec requirement.",
  "In-memory pipe tests via tokio::io::duplex — avoids spawning real processes in unit tests.",
]
constraints = [
  "stdout is exclusively for MCP protocol messages — no tracing, no panic output.",
  "Must handle arbitrarily long lines (large tool call arguments) without truncation.",
  "Transport must not panic on malformed input — all parse errors are handled and reported as JSON-RPC errors.",
]
failure_modes = [
  "Tokio stdin/stdout blocking on large messages — mitigated by BufReader/BufWriter with adequate buffer size.",
  "Panic in tool handler writes to stdout, corrupting the protocol stream — mitigated by catch_unwind in dispatch.",
  "Line ending differences (CRLF vs LF) across platforms — mitigated by trimming before parse.",
]
rationale = "Stdio is the primary transport for MCP clients like Claude Code that launch grokrs as a subprocess. Correctness here means the integration 'just works' for the most common use case."

[units.U13]
name = "HTTP+SSE transport: axum server with bearer token auth"
summary = """
Implement the HTTP+SSE transport in src/transport/sse.rs. Built on axum \
(already a transitive dependency via tokio). Routes: GET /sse establishes \
an SSE connection (server-to-client stream), POST /message receives \
client-to-server JSON-RPC messages. Bearer token authentication as an \
axum middleware layer: extract Authorization header, compare against the \
token from the environment variable named in mcp.bearer_token_env using \
constant-time equality (subtle crate or ring::constant_time::verify_slices_are_equal). \
Missing or invalid token returns 401 Unauthorized. \
SseTransport struct holds the axum Router, a SessionMap \
(Arc<RwLock<HashMap<SessionId, SessionContext>>>), and a shutdown signal. \
On GET /sse: generate a UUID session ID, create a Session<T> from config \
trust level, insert into SessionMap, send an initial 'endpoint' SSE event \
with the POST URL (including session_id query param), then keep the stream \
open sending server-to-client messages. On POST /message: extract \
session_id from query params, look up the session, dispatch the JSON-RPC \
message, send the response back via the SSE stream (not as HTTP response \
body — the POST returns 202 Accepted). On SSE disconnect: transition \
session to Closed, remove from SessionMap. Configurable host:port from \
McpConfig. Server refuses to start if bearer_token_env is set but the \
environment variable is not defined (clear error message). SseTransport::run \
binds the axum server and runs until shutdown signal. Tests: bearer token \
accepted (200 on /sse), missing token rejected (401), invalid token \
rejected (401), constant-time comparison (no timing side-channel — \
documented, not tested), SSE connection receives endpoint event, POST \
/message dispatches and response appears on SSE stream, session cleanup \
on SSE disconnect, multiple concurrent SSE connections get independent \
sessions, server refuses to start without bearer token env var set."""
layer = 0
tier = 1
status = "pending"
depends_on = ["U10", "U11"]
blocks = ["U20", "U21", "U22", "U23", "U30", "U31", "U32"]
estimated_loc = 580
files_create = [
  "crates/grokrs-mcp/src/transport/sse.rs",
]
files_modify = [
  "crates/grokrs-mcp/src/transport/mod.rs",
  "crates/grokrs-mcp/Cargo.toml",
]
acceptance = [
  "GET /sse with valid bearer token returns 200 and opens SSE stream",
  "GET /sse without bearer token returns 401 Unauthorized",
  "GET /sse with invalid bearer token returns 401 Unauthorized",
  "SSE stream sends initial 'endpoint' event with POST URL containing session_id",
  "POST /message with valid session_id dispatches JSON-RPC message and returns 202",
  "POST /message response appears on the corresponding SSE stream",
  "POST /message with unknown session_id returns 404",
  "SSE disconnect transitions session to Closed and removes from SessionMap",
  "Multiple concurrent SSE connections get independent session IDs and session state",
  "Server binds to configured host:port from McpConfig",
  "Server refuses to start when bearer_token_env is set but env var is not defined",
  "Server refuses to start when bearer_token_env env var is empty",
  "Bearer token comparison uses constant-time equality",
  "Server gracefully shuts down on shutdown signal (all SSE streams closed)",
]
produces = ["ART:sse-transport"]
consumes = ["ART:mcp-crate-scaffold", "ART:mcp-config", "ART:protocol-types", "ART:dispatch-framework"]
critical_decisions = [
  "axum is the HTTP framework — already a transitive dependency, well-maintained, async-native.",
  "Constant-time token comparison via subtle or ring — prevents timing attacks on bearer token.",
  "POST /message returns 202, not the JSON-RPC response — response goes via SSE stream per MCP spec.",
  "SessionMap uses Arc<RwLock<HashMap>> — simple concurrent access for moderate client counts.",
  "Server refuses to start without bearer token — fail-safe over fail-open.",
]
constraints = [
  "Must require allow_network = true in policy config (the server itself is a network listener) — enforced at CLI level in U31.",
  "Bearer token is read from an environment variable, never from config files or command-line arguments.",
  "SSE stream must remain open for the duration of the session — no premature close on idle.",
  "No OAuth 2.1 / PKCE in this implementation — shared bearer token only.",
]
failure_modes = [
  "SSE connection dropped by proxy/load balancer — client sees disconnect, creates new session. No reconnection to existing session.",
  "SessionMap grows unbounded if clients disconnect without proper SSE close — mitigated by periodic cleanup sweep or TTL on idle sessions.",
  "Large JSON-RPC messages in POST body exceed axum's default body limit — must configure body size limit explicitly.",
  "Env var read at startup only — token rotation requires server restart.",
]
rationale = "HTTP+SSE is the multi-client transport enabling IDE integrations and custom agents. Bearer token auth provides a minimum security boundary while OAuth is deferred."

[units.U14]
name = "MCP server builder and initialize/ping handshake"
summary = """
Implement the McpServer builder in src/lib.rs. McpServer holds: \
registered tools (Vec<Box<dyn ToolSpec>>), PolicyEngine reference, \
WorkspaceRoot, McpConfig, optional Store handle. McpServer::builder() \
creates a McpServerBuilder with methods: config(McpConfig), \
workspace(WorkspaceRoot), policy(PolicyEngine), tool(impl ToolSpec), \
store(Store). build() validates config and returns McpServer. \
Implement the initialize handler: receives InitializeRequest, negotiates \
protocol version, returns InitializeResult with ServerCapabilities \
advertising tools (if any registered), resources (always — workspace \
files), prompts (always — at minimum the system prompt). Handles the \
initialized notification (client confirms handshake). Implement ping \
handler: returns empty result. The server tracks connection state: \
Uninitialized -> Initialized. Requests other than initialize received \
before initialization return an error. Multiple initialize requests on \
the same connection return an error. Tests: build server with config + \
policy + workspace, initialize handshake returns correct serverInfo and \
capabilities, protocol version negotiation, ping returns empty result, \
pre-initialize request rejected, double-initialize rejected."""
