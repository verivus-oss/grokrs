[units.U21]
name = "Per-connection session management and trust level mapping"
summary = """
Implement session management in src/session.rs. McpSessionManager holds \
the session map and manages per-connection Session<T> instances. Trust \
level mapping: read mcp.trust_level from config, create Session<Untrusted>, \
Session<InteractiveTrusted>, or Session<AdminTrusted> based on the string \
value. Since trust level is a type parameter, use an enum dispatch pattern: \
McpTrustSession enum with variants Untrusted(Session<Untrusted>), \
InteractiveTrusted(Session<InteractiveTrusted>), \
AdminTrusted(Session<AdminTrusted>). This enum provides methods that \
delegate to the inner session regardless of trust level. \
SessionContext struct wraps McpTrustSession with metadata: session_id \
(UUID v4), transport type (stdio/sse), client info (from initialize \
request), connected_at timestamp. For stdio: single session, created \
on process start, transitions Created -> Ready after initialize, \
RunningTurn during tool calls, WaitingApproval during broker, Closed on \
EOF. For HTTP+SSE: one session per SSE connection, same lifecycle, \
independent state. Concurrent session map for SSE uses \
Arc<RwLock<HashMap<SessionId, SessionContext>>>. Session persistence: \
if grokrs-store is available, create a session record on connection, \
log state transitions. Tests: session created with correct trust level \
from config, session lifecycle transitions through all states, session \
metadata includes transport type and client info, concurrent sessions \
are independent (state change in one does not affect another), session \
persistence to store (when available), session operates without store \
(graceful degradation)."""
