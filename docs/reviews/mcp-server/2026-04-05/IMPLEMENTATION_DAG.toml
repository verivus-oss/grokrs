[units.U10]
name = "Crate scaffold, MCP config in grokrs-core, ToolSpec extensions"
summary = """
Create the grokrs-mcp crate with Cargo.toml (depends on grokrs-core, \
grokrs-cap, grokrs-policy, grokrs-session, grokrs-tool, serde, \
serde_json, tokio, tracing, uuid, thiserror). Register it as a workspace \
member. Add McpConfig struct to grokrs-core as mcp: Option<McpConfig> on \
AppConfig: transport (String, default "stdio"), trust_level (String, \
default "Untrusted"), host (String, default "127.0.0.1"), port (u16, \
default 3000), exposed_tools (Vec<String>, default empty), \
tool_timeout_secs (u64, default 60), resource_max_depth (u32, default 5), \
resource_max_files (u32, default 1000), bearer_token_env (String, default \
"GROKRS_MCP_TOKEN"). Update configs/grokrs.example.toml with a \
commented-out [mcp] section showing all fields with defaults. Extend \
ToolSpec trait in grokrs-tool with description() -> &'static str (default \
"") and input_schema() -> serde_json::Value (default empty object). Add \
schemars dependency to grokrs-tool. Create grokrs-mcp src/lib.rs with \
crate root (re-exports, MCP server builder stub) and src/error.rs with \
McpError enum covering JSON-RPC error codes: ParseError (-32700), \
MethodNotFound (-32601), InvalidParams (-32602), InternalError (-32603), \
PolicyDenied (-32001), ToolExecutionError (-32002), ApprovalTimeout \
(-32003). McpError implements Into<JsonRpcError> for structured \
serialization with human-readable messages. Tests: McpConfig \
deserialization with and without [mcp] section, existing configs still \
load, ToolSpec default methods return expected values, all McpError \
variants produce correct JSON-RPC error codes."""
