[units.U15]
name = "Tool handler: ToolSpec to MCP tools/list and tools/call with effect gating"
summary = """
Implement the tool handler in src/tools.rs. tools/list: iterate registered \
ToolSpec instances, filter by mcp.exposed_tools config (if non-empty), \
build ToolDefinition for each (name from ToolSpec::name(), description \
from ToolSpec::description(), inputSchema from ToolSpec::input_schema()), \
return the list. tools/call: deserialize arguments JSON into the tool's \
Input type, call input.classify() to get Vec<Effect>, evaluate each \
effect through PolicyEngine::evaluate(). If any effect returns Deny, \
return McpError::PolicyDenied with the effect description and denial \
reason. If any effect returns Ask, invoke the approval broker if \
configured; if no broker available, return McpError::PolicyDenied \
stating interactive approval required but no broker available; if broker \
returns Denied or Timeout, return McpError::PolicyDenied or \
McpError::ApprovalTimeout respectively. If all effects are Allow (or \
approved), call tool.execute() with a configurable timeout \
(mcp.tool_timeout_secs). On timeout, cancel execution and return \
McpError::ToolExecutionError with timeout message. On success, serialize \
the result as ToolCallResult with content items. On execution error, \
return McpError::ToolExecutionError. Tool execution is bounded by \
tokio::time::timeout. Log tool calls at info level (tool name + effects), \
log policy denials at warn level. If grokrs-store is available, log tool \
calls to transcripts with endpoint 'mcp://tools/call'. Tests: tools/list \
returns registered tools with correct definitions, exposed_tools config \
filters the list, tools/call with Allow effects executes tool and returns \
result, tools/call with Deny effect returns -32001 error with denial \
reason, tools/call with Ask effect and no broker returns error, tools/call \
with unknown tool name returns error, tools/call with invalid arguments \
returns -32602 error, tool timeout returns -32002 error, tool execution \
error returns -32002 error."""
