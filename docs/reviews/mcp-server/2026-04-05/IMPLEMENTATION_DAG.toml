rationale = "Protocol types and dispatch are the wire-level foundation. Every transport and handler depends on correct serialization and routing. Getting camelCase, optionality, and ID handling right here prevents protocol-level bugs."

[units.U12]
name = "Stdio transport: newline-delimited JSON message loop"
summary = """
Implement the stdio transport in src/transport/stdio.rs. The transport \
reads JSON-RPC messages from stdin (one per line, newline-delimited) and \
writes responses to stdout (one per line). Diagnostic output goes to \
stderr exclusively. The StdioTransport struct wraps a tokio BufReader on \
stdin and a tokio BufWriter on stdout. read_message() reads a line, \
parses it as JsonRpcRequest or JsonRpcNotification, returns the parsed \
message or a ParseError. write_message() serializes a JsonRpcResponse to \
JSON and writes it followed by a newline. The main loop: read message, \
dispatch to handler, write response (if request, not notification), \
repeat until stdin EOF. Handle notifications/cancelled by signaling \
cancellation to any in-flight tool call via a CancellationToken \
(tokio_util). The loop is async (tokio runtime). Graceful shutdown on \
stdin EOF: log session end to stderr, return. Integration with the \
McpServer builder: StdioTransport::run(server: McpServer) consumes the \
server and enters the loop. Tests: message round-trip via in-memory \
pipes (replace stdin/stdout with Vec<u8> or tokio duplex), multiple \
messages in sequence, malformed line returns parse error and continues, \
EOF terminates cleanly, notification does not produce a response, \
stderr output does not appear on stdout."""
layer = 0
tier = 1
status = "pending"
depends_on = ["U10", "U11"]
blocks = ["U20", "U21", "U22", "U23", "U30", "U31", "U32"]
