[units.U46]
name = "MCP client-side hosting: connect to local MCP servers as tool sources"
summary = """
Enable grokrs CLI to act as an MCP client, connecting to local MCP \
servers and discovering tools that can be used during agent sessions. \
This complements the existing remote MCP support (server-side, via \
API) with client-side MCP hosting (grokrs itself connects to MCP \
servers). Changes: (1) New MCP client transport in grokrs-api (or \
new crate grokrs-mcp): Streamable HTTP and SSE client for MCP \
protocol. (2) MCP tool discovery: list_tools, call_tool, handle \
results. (3) MCP tool adapter: wraps discovered MCP tools as \
ToolSpec implementations so they integrate with ToolRegistry. (4) \
Configuration: [mcp] section in config with server definitions \
(url, label, allowed_tools). (5) CLI flag: --mcp-server URL for \
ad-hoc server connections. (6) Agent integration: MCP tools appear \
in tool registry alongside built-in tools, filtered by trust rank. \
(7) Policy gate: MCP tool calls go through PolicyEngine as \
NetworkConnect effects."""
