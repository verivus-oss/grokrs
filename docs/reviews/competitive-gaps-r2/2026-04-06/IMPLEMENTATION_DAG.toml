# ---------------------------------------------------------------------------
# CONTEXT
# ---------------------------------------------------------------------------
# This DAG addresses gaps identified in the April 2026 competitive analysis,
# validated against the sqry index (102 files, 33,260 nodes, 43,928 edges).
#
# The original competitive-features DAG (21 units) delivered chat, agent,
# search, media gen, model discovery, and session management. This R2 DAG
# covers what's still missing:
#
# Tier 1 (xAI API parity):
#   U40 -- Encrypted reasoning content (Grok 4 reasoning continuity)
#   U41 -- Model catalog freshness (grok-4.20 defaults + docs)
#   U42 -- Voice Agent API client (WebSocket real-time voice)
#
# Tier 2 (competitor CLI parity):
#   U43 -- Headless/CI mode for agent command
#   U44 -- OpenTelemetry observability
#   U45 -- Cost reporting CLI
#   U46 -- MCP client-side hosting in CLI
#
# Tier 3 (polish + differentiation):
#   U47 -- Git workflow integration
#   U48 -- Agent memory (cross-session context)
#   U49 -- Config profiles
#   U50 -- Prompt cache CLI flag
#   U51 -- Integration tests for R2 features
#   U52 -- Doctor updates for R2 features
#   U53 -- Help text and documentation
#   U54 -- Example config extensions
#   U55 -- Deprecation notices and migration
#   U56 -- End-to-end test suite
#
# SCOPING DECISIONS:
# 1. U40 is trivially small (~200 LOC) but unblocks Grok 4 reasoning
#    continuity -- highest priority per unit of effort.
# 2. U41 is cosmetic but stale defaults (grok-3) undermine credibility.
# 3. U42 (Voice Agent) is the largest unit -- new WebSocket transport,
#    new types, new CLI command. Isolated from all other units.
# 4. U43 (headless) is the highest-impact CLI gap for adoption.
# 5. U44 (OTEL) is opt-in via cargo feature flag to avoid bloating
#    the binary for users who don't need it.
# 6. U46 (MCP client) is large and depends on U43 (headless agents
#    need tool sources beyond compiled-in tools).
# ---------------------------------------------------------------------------

# ===========================================================================
# LAYER 0 -- Foundation: small, no-dependency units
# ===========================================================================

[units.U40]
name = "Encrypted reasoning content passthrough"
summary = """
Add support for xAI's encrypted reasoning content feature. When \
`include: [\"reasoning.encrypted_content\"]` is sent in a Responses API \
request, Grok 4 models return encrypted reasoning traces that can be \
sent back in subsequent turns to provide reasoning continuity without \
exposing the raw chain-of-thought. Changes: (1) Add \
`encrypted_content` field to the Reasoning OutputItem type. (2) Add \
`ReasoningInclude` enum or allow arbitrary strings in the `include` \
vec on CreateResponseBuilder. (3) Add `InputItem::Reasoning` variant \
so encrypted reasoning can be passed back as structured input. (4) \
Store encrypted reasoning blobs in transcripts (new column or in \
response_body). (5) Wire through chat REPL so stateful conversations \
automatically replay encrypted reasoning. (6) Tests for round-trip \
serialization and multi-turn replay."""
layer = 0
tier = 1
status = "done"
depends_on = []
blocks = ["U51"]
estimated_loc = 250
files_create = []
files_modify = [
  "crates/grokrs-api/src/types/responses.rs",
  "crates/grokrs-cli/src/repl/grok_backend.rs",
  "crates/grokrs-store/src/transcript.rs",
]
acceptance = [
  "OutputItem::Reasoning has an optional encrypted_content: Option<String> field",
  "CreateResponseBuilder::include() accepts 'reasoning.encrypted_content' as a valid include directive",
  "Encrypted reasoning content deserializes from xAI wire format without loss",
  "InputItem has a Reasoning variant that carries encrypted_content for replay",
  "Chat REPL in stateful mode captures encrypted reasoning from responses and replays it in the next turn's input",
  "Transcript storage preserves encrypted reasoning blobs (in response_body JSON)",
  "Round-trip test: build request with include, deserialize response with encrypted_content, replay in next request",
  "Test: non-reasoning models return no encrypted_content (field is None)",
  "Test: encrypted_content is opaque -- no parsing or validation of the blob contents",
]
produces = ["ART:encrypted-reasoning"]
consumes = []
critical_decisions = [
  "Encrypted content is treated as opaque bytes (String) -- we never parse, decrypt, or validate it. xAI manages the encryption.",
  "Replay is automatic in stateful chat mode -- the user doesn't need to manage it manually.",
  "Storage in transcript response_body avoids a schema migration -- the JSON already captures the full response.",
]
constraints = [
  "Only grok-4 family models support encrypted reasoning. Non-reasoning models silently ignore the include directive.",
  "Encrypted reasoning increases token counts (the opaque blob counts as input tokens when replayed).",
]
failure_modes = [
  "Encrypted blob is too large for SQLite TEXT column -- mitigated by SQLite's 1GB text limit, reasoning blobs are typically <100KB.",
  "xAI changes the encryption format -- we treat it as opaque, so format changes are transparent to grokrs.",
]
rationale = "Enables reasoning continuity across multi-turn conversations with Grok 4 models. Without this, each turn starts reasoning from scratch, degrading quality on complex multi-step tasks."

