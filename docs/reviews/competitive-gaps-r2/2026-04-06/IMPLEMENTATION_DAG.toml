[units.U44]
name = "OpenTelemetry observability: tracing spans for requests, tools, sessions"
summary = """
Add opt-in OpenTelemetry instrumentation to grokrs. Behind a cargo \
feature flag 'otel' to avoid bloating the default binary. Changes: \
(1) Add tracing and tracing-opentelemetry dependencies (feature-gated). \
(2) Instrument HttpClient: span per HTTP request with attributes \
(endpoint, method, status_code, latency_ms, model, input_tokens, \
output_tokens, cost_usd). (3) Instrument tool execution: span per \
tool call with attributes (tool_name, trust_level, policy_decision, \
execution_ms). (4) Instrument session lifecycle: span per session \
with attributes (session_id, trust_level, state_transitions, \
total_turns, total_cost). (5) Instrument agent loop: span per agent \
iteration with attributes (iteration_number, tools_called, \
tokens_used). (6) Add --otel-endpoint flag to CLI for OTLP exporter \
configuration. (7) Add GROKRS_OTEL_ENDPOINT env var as alternative. \
(8) Document setup with Jaeger, Grafana, Datadog, Honeycomb."""
layer = 1
tier = 2
status = "done"
depends_on = []
blocks = ["U51", "U52", "U53"]
estimated_loc = 650
files_create = [
  "crates/grokrs-api/src/transport/telemetry.rs",
  "crates/grokrs-cli/src/telemetry.rs",
]
files_modify = [
