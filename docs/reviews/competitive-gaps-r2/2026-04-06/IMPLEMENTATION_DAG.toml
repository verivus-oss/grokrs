git tool classified under appropriate Effect: git_status/git_diff \
as FsRead, git_add as FsWrite, git_commit as FsWrite. (3) Trust \
levels: git_status/git_diff at rank 0 (untrusted), git_add at \
rank 1 (interactive), git_commit at rank 2 (admin). (4) Git \
operations use git2 crate (libgit2 bindings) -- no shelling out. \
(5) All git operations scoped to WorkspaceRoot -- cannot affect \
repos outside the workspace. (6) Commit messages include \
'[grokrs-agent]' prefix for auditability."""
