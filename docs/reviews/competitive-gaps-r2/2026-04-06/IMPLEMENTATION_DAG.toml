[units.U42]
name = "Voice Agent API client: WebSocket transport and CLI command"
summary = """
Implement the xAI Voice Agent API, which uses WebSocket for real-time \
bidirectional voice conversations. This is a fundamentally different \
transport from the HTTP REST endpoints. Changes: (1) New transport \
module in grokrs-api: WebSocket client using tokio-tungstenite, \
connection management, automatic reconnection, heartbeat/ping-pong. \
(2) New types module: VoiceSession, VoiceConfig (voice, language, \
turn detection, VAD settings), VoiceEvent (audio chunks, transcripts, \
function calls, state changes), VoiceMessage (client-to-server audio \
and control frames). (3) New endpoint module: VoiceAgentClient with \
connect(), send_audio(), send_text(), close(). (4) Audio I/O: PCM \
capture from microphone via cpal, playback of received audio. (5) \
New CLI command: `grokrs voice` -- interactive voice session with \
terminal UI showing transcription, function calls, and state. (6) \
Voice sessions recorded in store (session type 'voice', transcript \
includes text transcriptions). (7) Policy gate for NetworkConnect \
effect on voice WebSocket connection. (8) Integration with existing \
function calling -- voice agent can invoke tools during conversation."""
