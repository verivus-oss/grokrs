[units.U43]
name = "Headless/CI mode for agent command"
summary = """
Add a --headless flag to `grokrs agent` that makes it suitable for \
CI/CD pipelines, GitHub Actions, cron jobs, and scripted automation. \
Changes: (1) New --headless flag on agent command. (2) In headless \
mode: no TTY interaction, no colored output, no progress spinners, \
no approval prompts. (3) JSON output mode: --output json emits \
structured JSON to stdout (one JSON object per event: tool_call, \
tool_result, message, error, usage). (4) Exit codes: 0 = success, \
1 = agent error, 2 = policy denial, 3 = API error, 4 = timeout. \
(5) --timeout flag for maximum execution time (default: none in \
interactive, 300s in headless). (6) Stdin input: accept task \
description from stdin when --headless (for piping). (7) \
Approval mode auto-set to 'deny' in headless (no one to approve). \
(8) Session recording still works in headless mode."""
layer = 1
tier = 2
status = "done"
depends_on = []
blocks = ["U46", "U51", "U52"]
estimated_loc = 550
files_create = []
files_modify = [
  "crates/grokrs-cli/src/commands/agent.rs",
  "crates/grokrs-cli/src/main.rs",
]
acceptance = [
