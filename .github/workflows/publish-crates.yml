name: Publish Crates

on:
  workflow_dispatch:
    inputs:
      crate:
        description: "Workspace crate to publish"
        required: true
        type: choice
        options:
          - grokrs-core
          - grokrs-cap
          - grokrs-policy
          - grokrs-session
          - grokrs-store
          - grokrs-tool
          - grokrs-api
          - grokrs-cli

permissions:
  contents: read

concurrency:
  group: publish-crates-${{ github.event.inputs.crate }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Verify package
        run: cargo package -p ${{ github.event.inputs.crate }} --allow-dirty --no-verify

  publish:
    needs: package
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Publish crate
        run: cargo publish -p ${{ github.event.inputs.crate }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
