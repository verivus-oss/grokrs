name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo test
        run: cargo test

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: grokrs doctor
        run: cargo run -p grokrs-cli -- doctor

      - name: grokrs show-config
        run: cargo run -p grokrs-cli -- show-config configs/grokrs.example.toml
